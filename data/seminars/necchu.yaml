meta:
  id: necchu
  title: 熱中症予防 労働衛生教育
  subtitle: WBGT・現場運用対応コース
  english_title: HEAT STROKE PREVENTION
  english_subtitle: Workplace Occupational Health Education
  legal_basis: "基発0420第3号「職場における熱中症予防基本対策要綱」（令和3年4月20日付）準拠"
  duration: 約1.5時間
  supervisor: ANZEN AI
  contact: "https://safe-ai-site.vercel.app/contact"
  output: necchu.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 労働衛生教育
    english_title: HEAT STROKE PREVENTION
    title: 熱中症予防 労働衛生教育
    subtitle: WBGT・現場運用対応コース
    legal: 基発0420第3号準拠 ／ 約1.5時間
    supervisor: ANZEN AI

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ今、熱中症予防か
        body: 業務上熱中症の発生動向と2025年安衛則改正の背景
      - num: "02"
        head: 熱中症対策の4要素
        body: 作業環境管理・作業管理・健康管理・労働衛生教育
      - num: "03"
        head: WBGT基準値と作業強度
        body: JIS Z 8504に基づく区分と現場での運用
      - num: "04"
        head: 緊急時対応 4STEP
        body: 意識確認→搬送・冷却→119通報→記録報告
      - num: "05"
        head: 環境改善と水分・塩分摂取の原則
        body: 遮熱・送風・休憩室と計画的補給の実務
      - num: "06"
        head: 暑熱順化と事業者の責務
        body: 5日〜2週間の順化計画と法定責任の整理

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ今、熱中症予防か
    title_en: WHY NOW
    big_value: "35"
    big_unit: "%"
    big_caption: 業務上熱中症 死傷者に占める建設業の比率（年間平均）
    source: 厚生労働省「職場における熱中症による死傷災害の発生状況」
    chart_title: 業種別 熱中症死傷者数の傾向（相対値）
    chart_data:
      - label: 建設業
        value: 1.00
      - label: 製造業
        value: 0.85
      - label: 運輸業
        value: 0.42
      - label: 警備業
        value: 0.31
      - label: 清掃・廃棄物
        value: 0.27
    chart_note: ※建設業の発生率を1.00として正規化した業種別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（熱中症対策4要素）
  # =========================================================
  - layout: four_quadrant
    title: 熱中症対策の4要素
    title_en: FOUR PILLARS
    intro: 2025年6月1日施行 安衛則改正（WBGT28以上または気温31度以上の作業で措置義務化）
    quadrants:
      - num: "01"
        head: 作業環境管理
        body: WBGT値の測定・記録、遮熱・送風・冷房、日除け・休憩室の整備、湿度・気流の制御
      - num: "02"
        head: 作業管理
        body: 休憩時間の確保、計画的水分・塩分補給、作業時間短縮・スケジュール調整、単独作業の回避
      - num: "03"
        head: 健康管理
        body: 暑熱順化、雇入時・配置替時健診、巡視と声かけ、既往歴・服薬状況の把握、体調記録
      - num: "04"
        head: 労働衛生教育・緊急対応
        body: 症状・予防の教育、緊急時連絡網の整備、報告・記録の体制、AED・冷却資材の配備

  # =========================================================
  # Slide 5 — 表（WBGT基準値）
  # =========================================================
  - layout: table
    title: WBGT基準値と作業強度
    title_en: WBGT REFERENCE VALUES
    headers: ["区分", "身体作業強度", "WBGT基準値", "対応"]
    rows:
      - ["軽い", "事務・軽作業（座位・立位での軽作業）", "32.5℃", "通常作業可。水分補給と巡視を励行"]
      - ["中程度", "歩行・組立・運搬等の中等度作業", "29.0℃", "休憩時間延長、作業強度の見直し"]
      - ["やや重い", "重量物取扱い・重機作業等", "27.5℃", "作業時間短縮、こまめな休憩、単独作業禁止"]
      - ["重い", "つるはし・スコップ作業等の重作業", "26.5℃", "作業中止検討、暑熱順化未了者は配置回避"]
      - ["非常に重い", "全身を激しく使う作業", "25.0℃", "原則作業中止、冷却・休憩優先"]
    footnote: 出典：JIS Z 8504 ／ 基発0420第3号 別添「職場における熱中症予防基本対策要綱」より要約

  # =========================================================
  # Slide 6 — フロー（緊急時対応 4STEP）
  # =========================================================
  - layout: flow
    title: 緊急時対応 4STEP
    title_en: EMERGENCY RESPONSE FLOW
    intro: 異変を感じたら作業を中止し、迷わず4STEPを実行する
    steps:
      - num: "STEP 1"
        head: 意識・症状の確認
        body: 呼びかけ反応、めまい・吐き気・けいれん・高体温の有無を確認
      - num: "STEP 2"
        head: 涼所搬送・冷却
        body: 風通しの良い日陰へ移動、衣服を緩めて首・脇・鼠径部を冷却
      - num: "STEP 3"
        head: 119通報
        body: 意識障害・経口摂取不可・改善なしは即時通報。単独で抱え込まない
      - num: "STEP 4"
        head: 記録・報告・再発防止
        body: 発生時のWBGT・作業内容・対応を記録し、原因分析と対策見直し

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 環境改善と補給の原則
    title_en: ENVIRONMENT & HYDRATION
    left_head: WBGT低減対策 4ポイント
    left_subhead: ENVIRONMENTAL CONTROL
    left_items:
      - head: 遮熱・日除けの設置
        body: 直射日光を遮るシートやテント、反射塗装で輻射熱を低減
      - head: 送風・気流の確保
        body: 大型扇風機・スポットクーラーで体感温度を下げる
      - head: クールシャワー・ミスト
        body: 休憩時の身体冷却。手・前腕の冷水浸漬も有効
      - head: 冷房付き休憩室
        body: 横になれる広さを確保し、飲料・塩分・氷を常備
    right_head: 水分・塩分摂取 4ポイント
    right_subhead: HYDRATION
    right_items:
      - head: こまめに先取りで補給
        body: 喉が渇く前に20〜30分ごと、コップ1杯を目安に
      - head: 塩分濃度0.1〜0.2%
        body: スポーツドリンクや経口補水液で電解質を補う
      - head: 計画的な補給時刻
        body: 作業前・休憩時・作業後を必ずセット
      - head: 1日1.2L以上を目安
        body: 高温多湿環境では汗量に応じてさらに増やす

  # =========================================================
  # Slide 8 — 5ステップ（暑熱順化）
  # =========================================================
  - layout: five_steps
    title: 暑熱順化 5ステップ
    title_en: HEAT ACCLIMATIZATION
    intro: 順化未了者の発症リスクが高い。最初の1週間は段階的に作業時間を増やす
    steps:
      - num: "01"
        head: 1日目 短時間慣らし
        body: 通常の50%程度の作業時間に抑え、こまめに休憩を入れる
      - num: "02"
        head: 2〜3日目 段階増
        body: 60〜70%まで作業時間を延ばし、体調観察を継続
      - num: "03"
        head: 4〜5日目 標準化
        body: 通常作業時間に近づける。水分・塩分補給は継続強化
      - num: "04"
        head: 6〜7日目 定着
        body: 通常作業時間で運用。異変時は直ちに作業中止
      - num: "05"
        head: 連休明け・新規入場
        body: 順化はリセットされる前提で再度1週間の段階増を実施

  # =========================================================
  # Slide 9 — 4項目（事業者の責務）
  # =========================================================
  - layout: duties
    title: 事業者の責務
    title_en: EMPLOYER'S DUTIES
    intro: 安衛法第22条・第59条および基発0420第3号、2025年6月1日施行の安衛則改正に基づく取組み
    items:
      - num: "01"
        head: WBGT測定と記録
        body: 高温多湿作業場で作業前・作業中の測定を行い、結果を記録・掲示
      - num: "02"
        head: 巡視と体調確認
        body: 管理者による定期巡視と声かけ、単独作業の回避と相互観察体制
      - num: "03"
        head: 教育・訓練の実施
        body: 雇入時・配置替時に症状・予防・緊急対応を教育、年1回以上の再教育
      - num: "04"
        head: 報告・記録体制の整備
        body: 緊急連絡網と発生時報告フロー、健診・教育・対応記録を3年以上保存

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: WBGTで判断、感覚に頼らない
        body: 測定値に基づく作業計画と休憩設計が基本
      - num: "02"
        head: 暑熱順化は1週間かけて段階的に
        body: 連休明け・新規入場者は特に注意
      - num: "03"
        head: 緊急時は迷わず4STEP
        body: 意識障害は即119、冷却を並行して実施
      - num: "04"
        head: 記録と再評価で継続改善
        body: 教育・健診・対応記録を3年保存し毎年見直し
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI
