meta:
  id: kensaku-toishi
  title: 研削といし取替え等 特別教育
  subtitle: 学科＋実技対応コース
  english_title: ABRASIVE WHEEL HANDLING SPECIAL EDUCATION
  english_subtitle: Special Education for Grinding Wheel Replacement and Test Run
  legal_basis: 安衛則第36条第1号 ／ 安衛則第38条 ／ 学科2時間以上＋実技2時間以上
  duration: 約4時間（学科2h + 実技2h）
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: https://safe-ai-site.vercel.app/contact
  output: kensaku-toishi.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: ABRASIVE WHEEL HANDLING SPECIAL EDUCATION
    title: 研削といし取替え等 特別教育
    subtitle: 学科＋実技対応コース
    legal: 安衛則第36条第1号・第38条準拠 ／ 約4時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ研削といし教育が必要か
        body: 破裂・飛散による重篤災害と特別教育の位置づけ
      - num: "02"
        head: 学科カリキュラムの4要素
        body: 取扱業務・といし構造・関係法令・試運転と異常対応
      - num: "03"
        head: 学科＋実技の時間割
        body: 法定2時間＋2時間の科目構成と実施内容
      - num: "04"
        head: 取替え作業 4STEP
        body: 仕様確認→取付け→試運転→異常時対応の手順
      - num: "05"
        head: 破裂要因と正しい取付け
        body: 事故メカニズムと取付けポイントの整理
      - num: "06"
        head: 試運転5ステップと管理者責務
        body: 始業時1分・取替え後3分の運用と法的責任
  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ研削といし教育か
    title_en: WHY NOW
    big_value: "60"
    big_unit: "%"
    big_caption: 研削関連災害における「飛来・落下／はさまれ・巻込まれ」が占める比率
    source: 厚生労働省「労働災害発生状況」事故の型別調査
    chart_title: 事故の型別 研削関連災害の傾向（相対値）
    chart_data:
      - label: 飛来・落下
        value: 1.00
      - label: 切れ・こすれ
        value: 0.82
      - label: はさまれ・巻込まれ
        value: 0.55
      - label: 激突
        value: 0.38
      - label: その他
        value: 0.21
    chart_note: ※飛来・落下を1.00として正規化した事故の型別の概算傾向。

  # =========================================================
  # Slide 4 — 4象限カード（学科カリキュラム4要素）
  # =========================================================
  - layout: four_quadrant
    title: 学科カリキュラムの4要素
    title_en: FOUR PILLARS
    intro: 安衛則第38条 別表第4が定める研削といし取替え等の特別教育 学科科目
    quadrants:
      - num: "01"
        head: 取扱業務に関する知識
        body: 研削盤の種類・構造・用途、研削加工の基礎、作業手順、危険性と防護
      - num: "02"
        head: といし・取付具に関する知識
        body: といしの種類と表示記号、構造強度、フランジ・ブッシュ等取付具の選定
      - num: "03"
        head: 関係法令
        body: 安衛法・安衛則 第二編第一章第三節（研削盤等）、特別教育規程の要点
      - num: "04"
        head: 試運転と異常時対応
        body: 始業時1分・取替え後3分の試運転、振動・異音時の停止と再点検手順

  # =========================================================
  # Slide 5 — 表（学科＋実技 時間割）
  # =========================================================
  - layout: table
    title: 学科＋実技 時間割
    title_en: CURRICULUM HOURS
    headers: ["項目", "区分", "時間", "主な内容"]
    rows:
      - ["取扱業務に関する知識", "学科", "0.5h", "研削盤の構造・用途・危険性"]
      - ["といし・取付具に関する知識", "学科", "1.0h", "種類・表示記号・フランジ等取付具"]
      - ["関係法令", "学科", "0.5h", "安衛則・特別教育規程の要点"]
      - ["といしの取付け方法・試運転", "実技", "1.0h", "取付手順・つり合い試験・試運転"]
      - ["といしを用いた研削作業", "実技", "1.0h", "作業姿勢・防護具・異常時停止"]
    footnote: 出典：労働安全衛生規則第38条・特別教育規程第1条（学科2h以上＋実技2h以上）

  # =========================================================
  # Slide 6 — フロー（取替え作業 4STEP）
  # =========================================================
  - layout: flow
    title: 取替え作業 4STEP
    title_en: REPLACEMENT FLOW
    intro: 安衛則第118条の趣旨に沿い、取替えから試運転までを定型手順化する
    steps:
      - num: "STEP 1"
        head: 仕様・適合確認
        body: 最高使用周速度・寸法・表示記号と機械側仕様の整合確認
      - num: "STEP 2"
        head: 取付け・締付け
        body: フランジ・ブッシュ・紙パッキンの正規組合せでトルク管理
      - num: "STEP 3"
        head: 試運転
        body: 側方退避のうえ取替え後3分以上、始業時1分以上の無負荷運転
      - num: "STEP 4"
        head: 異常時対応・記録
        body: 振動・異音・偏心は即停止し再点検。実施結果と点検者を記録

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 破裂要因と正しい取付け
    title_en: SAFE MOUNTING
    left_head: といし破裂の主要要因 4ポイント
    left_subhead: RUPTURE CAUSES
    left_items:
      - head: 最高使用周速度の超過
        body: 機械の回転数とといし表示記号の不整合は破裂の主要因
      - head: 衝撃・ひび割れの見落とし
        body: 落下・打撃を受けたといしは外観正常でも内部亀裂が残存
      - head: フランジ・取付具の不適合
        body: 寸法違い・偏当たり・締付不足が応力集中を招く
      - head: 側面研削・無理な押当て
        body: 設計用途外の使用や過大な押付け力で破断荷重を超過
    right_head: 正しい取付け 4ポイント
    right_subhead: PROPER MOUNTING
    right_items:
      - head: 受入れ時の音響検査
        body: 木製ハンマで軽打し清音を確認、濁音は使用禁止
      - head: 規定フランジと紙パッキン
        body: 同径・同形状フランジを左右対称に、紙パッキンを必ず介挿
      - head: 段階的な締付け
        body: 対角順で均等に締め、規定トルクを超えない管理を徹底
      - head: 取替え後3分以上の試運転
        body: 側方に退避し、振動・異音・偏心の有無を目視と聴覚で確認

  # =========================================================
  # Slide 8 — 5ステップ（試運転）
  # =========================================================
  - layout: five_steps
    title: 試運転の5ステップ
    title_en: TEST RUN PROCEDURE
    intro: 安衛則第118条に基づく試運転は、取替え時と始業時で時間が異なる
    steps:
      - num: "01"
        head: 始業時1分以上
        body: 毎日の作業開始前に1分以上の無負荷運転で異常の有無を確認
      - num: "02"
        head: 取替え後3分以上
        body: といし取替え時は3分以上、強度確認と慣らし運転を行う
      - num: "03"
        head: 振動・異音の確認
        body: 軸受・取付具の緩み、偏心・うなりの有無を目視と聴覚で点検
      - num: "04"
        head: といし側方への退避
        body: 万一の破裂に備え、回転面の正面に立たず側方に退避する
      - num: "05"
        head: 結果の記録
        body: 実施日・実施者・点検結果を記録し、是正履歴とともに保存

  # =========================================================
  # Slide 9 — 4項目（管理者の責務）
  # =========================================================
  - layout: duties
    title: 管理者の責務
    title_en: MANAGER'S DUTIES
    intro: 安衛法第59条第3項（特別教育）および安衛則第38条・第118条に基づく使用者の取組み
    items:
      - num: "01"
        head: 特別教育の確実な実施
        body: 学科2時間＋実技2時間以上を雇入れ時・配置替え時に実施し受講記録を整備
      - num: "02"
        head: 教育記録の3年保存
        body: 受講者氏名・科目・時間・講師名を記録し、3年以上保存（安衛則第38条）
      - num: "03"
        head: 始業前点検の徹底
        body: 試運転・防護カバー・受け台の隙間（3mm以下）を毎日確認させる
      - num: "04"
        head: 保護具と是正の運用
        body: 保護めがね・防じんマスクを支給、不適合といしは即廃棄処分

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 破裂は致命的、教育は法定義務
        body: 取替え業務は安衛則第36条第1号の特別教育対象
      - num: "02"
        head: 試運転は1分・3分ルール
        body: 始業時1分以上、取替え後3分以上の無負荷運転を徹底
      - num: "03"
        head: 側方退避と受入れ検査
        body: 正面に立たない、音響検査でといしの健全性を確認
      - num: "04"
        head: 記録と継続改善
        body: 教育記録・点検記録を3年保存し、毎年見直す
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
