meta:
  id: sankesu
  title: 酸素欠乏危険作業 特別教育
  subtitle: 第一種・第二種対応コース
  english_title: OXYGEN DEFICIENCY HAZARDOUS WORK
  english_subtitle: Special Education for Oxygen Deficiency Risks
  legal_basis: 酸素欠乏症等防止規則第12条 ／ 第一種5.5時間 ／ 第二種5.5時間（硫化水素含む追加内容で計5.5h相当）
  duration: 約5.5時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: "https://safe-ai-site.vercel.app/contact"
  output: sankesu.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: OXYGEN DEFICIENCY HAZARDOUS WORK
    title: 酸素欠乏危険作業 特別教育
    subtitle: 第一種・第二種対応コース
    legal: 酸欠則第12条準拠 ／ 約5.5時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: 酸欠災害の致死率と現状
        body: 一度発生すると約半数が死亡に至る重大災害
      - num: "02"
        head: 第一種・第二種の違い
        body: 酸欠単独か、硫化水素中毒も対象に含むか
      - num: "03"
        head: 学科法定4区分
        body: 発生原因／症状／換気・保護具／救護・法令
      - num: "04"
        head: 入槽前4STEP
        body: 測定→換気→再測定→監視の徹底
      - num: "05"
        head: リスク場所と保護具
        body: 4分類のリスク場所と換気・呼吸器の選定
      - num: "06"
        head: 救助5ステップと作業主任者の責務
        body: 二次災害防止と法定義務

  # =========================================================
  # Slide 3 — 大数字 + 場所別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ酸欠は重大災害か
    title_en: WHY OXYGEN DEFICIENCY
    big_value: "50"
    big_unit: "%"
    big_caption: 酸欠災害における致死率（被災者に占める死亡者の割合）
    source: 厚生労働省「酸素欠乏症等災害発生状況」
    chart_title: 酸欠災害 発生場所別件数（相対値）
    chart_data:
      - label: マンホール・下水
        value: 1.00
      - label: タンク・ピット
        value: 0.82
      - label: 地下室・地下ピット
        value: 0.61
      - label: 船倉・サイロ
        value: 0.39
      - label: 不活性ガス区画
        value: 0.25
    chart_note: ※マンホール・下水での発生件数を1.00として正規化した発生場所別の概算。

  # =========================================================
  # Slide 4 — 4象限カード（学科法定4区分）
  # =========================================================
  - layout: four_quadrant
    title: 学科 法定4区分
    title_en: FOUR LEGAL TOPICS
    intro: 酸欠則第12条が定める特別教育のカリキュラム体系
    quadrants:
      - num: "01"
        head: 酸素欠乏の発生原因
        body: 微生物による酸素消費、酸化反応、不活性ガス置換、水没・湧水、植物・果実の呼吸作用
      - num: "02"
        head: 酸素欠乏症の症状
        body: 18%未満で症状発現、16%で頭痛・吐き気、10%で意識消失、6%以下で即死の危険
      - num: "03"
        head: 換気・保護具等の使用方法
        body: 強制換気、酸素濃度計、空気呼吸器、送気マスク、命綱・墜落制止用器具
      - num: "04"
        head: 事故時の救護及び関係法令
        body: 二次災害防止、人工呼吸、救助手順、酸欠則・安衛法・関係省令

  # =========================================================
  # Slide 5 — 表（カリキュラム時間割）
  # =========================================================
  - layout: table
    title: カリキュラム時間割
    title_en: CURRICULUM TIMETABLE
    headers: ["区分", "科目", "第一種", "第二種"]
    rows:
      - ["学科", "酸素欠乏の発生原因", "1.0h", "1.0h"]
      - ["学科", "酸素欠乏症（および硫化水素中毒）の症状", "1.0h", "1.0h"]
      - ["学科", "空気呼吸器等の使用方法", "1.0h", "1.0h"]
      - ["学科", "事故時の退避・救急蘇生の方法", "1.0h", "1.0h"]
      - ["学科", "関係法令", "1.0h", "1.0h"]
      - ["実技", "空気呼吸器等の取扱い", "0.5h", "0.5h"]
    footnote: 出典：酸欠則第12条 ／ 第二種は硫化水素中毒に関する内容を含む（計5.5h相当）

  # =========================================================
  # Slide 6 — フロー（入槽前4STEP）
  # =========================================================
  - layout: flow
    title: 入槽前 4STEP
    title_en: PRE-ENTRY FLOW
    intro: 酸欠則が定める作業開始前の必須手順
    steps:
      - num: "STEP 1"
        head: 酸素濃度測定
        body: 作業開始前に、上層・中層・下層の3点以上で酸素濃度・硫化水素濃度を測定
      - num: "STEP 2"
        head: 換気
        body: 酸素18%以上・硫化水素10ppm以下になるまで強制換気を実施
      - num: "STEP 3"
        head: 再測定
        body: 換気後、入槽直前に再度測定し基準値を満たすことを確認
      - num: "STEP 4"
        head: 作業者監視
        body: 監視員を槽外に配置し、入槽者と常時連絡。継続的に濃度監視を実施

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: リスク場所と保護具のポイント
    title_en: RISK & PPE POINTS
    left_head: 酸欠リスク場所 4分類
    left_subhead: HAZARDOUS LOCATIONS
    left_items:
      - head: 地下空間
        body: マンホール、地下ピット、共同溝。微生物による酸素消費が起こりやすい
      - head: タンク・反応槽
        body: 内部塗装の酸化、洗浄残液からの硫化水素発生に注意
      - head: 果実・穀物倉庫
        body: 植物の呼吸作用やドライアイス昇華で酸素濃度が低下
      - head: 不活性ガス区画
        body: 窒素・アルゴンパージ後の配管・容器内は急速に意識消失の危険
    right_head: 換気・保護具 4ポイント
    right_subhead: VENTILATION & PPE
    right_items:
      - head: 強制換気
        body: 自然換気では不十分。送風機で空気を送り込み槽内空気を入替
      - head: 空気呼吸器・送気マスク
        body: 防毒マスクは無効。給気式呼吸用保護具を必ず選定
      - head: 命綱・墜落制止用器具
        body: 引き上げ救助用ハーネスを装着、槽外で確保
      - head: 監視員の常時配置
        body: 入槽者1名につき監視員1名以上、無線・呼びかけで状況把握

  # =========================================================
  # Slide 8 — 5ステップ（救助）
  # =========================================================
  - layout: five_steps
    title: 救助 5ステップ
    title_en: RESCUE PROCEDURE
    intro: 二次災害（救助者の被災）が酸欠死亡の最大要因。装備なしで進入しない
    steps:
      - num: "01"
        head: 呼びかけ・状況確認
        body: 槽外から声かけし応答を確認。安易に進入せず周囲に応援を要請
      - num: "02"
        head: 119通報
        body: 救急要請。酸欠・硫化水素の可能性を必ず伝達
      - num: "03"
        head: 監視員確保・換気強化
        body: 救助中も酸素濃度・ガス濃度を監視。送風機を最大稼働
      - num: "04"
        head: 救助者の保護具装着
        body: 空気呼吸器・命綱を装着してから進入。素手・素面の進入は厳禁
      - num: "05"
        head: 救出・蘇生・搬送
        body: 命綱で引き上げ、安全な場所で気道確保・人工呼吸・AED使用後に搬送

  # =========================================================
  # Slide 9 — 4項目（作業主任者の責務）
  # =========================================================
  - layout: duties
    title: 酸素欠乏危険作業主任者の責務
    title_en: WORK CHIEF DUTIES
    intro: 酸欠則第11条に基づき、技能講習修了者から選任される作業主任者の法定義務
    items:
      - num: "01"
        head: 作業前・作業中の濃度測定
        body: 酸素18%以上・硫化水素10ppm以下を作業中も継続的に確認・記録
      - num: "02"
        head: 人員点呼と入退場管理
        body: 入槽者の氏名・人数を点呼で確認、退避時の取り残しゼロを確保
      - num: "03"
        head: 退避指示・救助指揮
        body: 異常時は即時退避を指示、装備なき救助進入を絶対に許可しない
      - num: "04"
        head: 教育記録・点検記録の保存
        body: 特別教育記録、濃度測定記録、保護具点検記録を3年以上保存

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 第一種は酸欠、第二種は酸欠＋硫化水素
        body: 作業場所のリスクに応じた特別教育を選択
      - num: "02"
        head: 18%以上・10ppm以下を死守
        body: 酸素濃度18%・硫化水素10ppmを下回ったら即時退避
      - num: "03"
        head: 入槽前4STEPの徹底
        body: 測定→換気→再測定→監視を毎回実施
      - num: "04"
        head: 二次災害防止が救助の鉄則
        body: 装備なしの進入は絶対禁止。空気呼吸器と命綱を必ず装着
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
