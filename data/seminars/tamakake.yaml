meta:
  id: tamakake
  title: 玉掛け 特別教育
  subtitle: つり上げ荷重1t未満の業務
  english_title: SLING WORK SPECIAL EDUCATION (Under 1 ton)
  english_subtitle: Special Education for Sling Operations
  legal_basis: 安衛則第36条第19号 ／ 学科5時間＋実技4時間 ／ 安衛則別表第5
  duration: 約9時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: "https://safe-ai-site.vercel.app/contact"
  output: tamakake.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: SLING WORK SPECIAL EDUCATION
    title: 玉掛け 特別教育
    subtitle: つり上げ荷重1t未満の業務
    legal: 安衛則第36条第19号準拠 ／ 約9時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: 玉掛け災害の現状
        body: クレーン等災害における玉掛け起因事故の実態
      - num: "02"
        head: 学科法定4区分の全体像
        body: クレーン等／玉掛け方法／合図／関係法令
      - num: "03"
        head: 1t未満と1t以上の境界
        body: 特別教育と技能講習の使い分け
      - num: "04"
        head: 玉掛け作業4STEP
        body: 質量目測→用具選定→玉掛け→合図・吊り上げ
      - num: "05"
        head: 用具点検と合図のポイント
        body: ワイヤロープ・スリング・退避位置
      - num: "06"
        head: 禁止事項と責務分担
        body: 5つの禁止行為と運転者・玉掛け者の役割

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ玉掛け教育が重要か
    title_en: WHY SLING TRAINING
    big_value: "30"
    big_unit: "%"
    big_caption: クレーン等災害に占める玉掛け起因の比率
    source: 厚生労働省「労働災害発生状況」
    chart_title: クレーン等災害 起因別件数（相対値）
    chart_data:
      - label: 玉掛け不良
        value: 1.00
      - label: 運転操作ミス
        value: 0.78
      - label: 合図ミス
        value: 0.55
      - label: 用具破損
        value: 0.41
      - label: その他
        value: 0.22
    chart_note: ※玉掛け不良起因の発生件数を1.00として正規化した相対値の概算。

  # =========================================================
  # Slide 4 — 4象限カード（学科法定4区分）
  # =========================================================
  - layout: four_quadrant
    title: 学科 法定4区分
    title_en: FOUR LEGAL TOPICS
    intro: 安衛則別表第5が定める玉掛け特別教育（1t未満）のカリキュラム体系
    quadrants:
      - num: "01"
        head: クレーン等に関する知識
        body: クレーン・移動式クレーン・デリック等の種類・構造・取扱いに関する基礎知識（1時間）
      - num: "02"
        head: 玉掛けの方法
        body: 玉掛け用具の選定・使用方法、質量目測、力学の基礎、玉掛け作業の手順（2時間）
      - num: "03"
        head: クレーン等の運転のための合図
        body: 手・笛・声による合図方法、無線通信、合図者の位置取り（1時間）
      - num: "04"
        head: 関係法令
        body: 安衛法・安衛令・安衛則・クレーン等安全規則中の関係条項（1時間）

  # =========================================================
  # Slide 5 — 表（カリキュラム時間割）
  # =========================================================
  - layout: table
    title: カリキュラム時間割
    title_en: CURRICULUM TIMETABLE
    headers: ["区分", "科目", "時間", "主な内容"]
    rows:
      - ["学科", "クレーン等に関する知識", "1.0h", "種類・構造・取扱い"]
      - ["学科", "玉掛けの方法", "2.0h", "用具選定・質量目測・手順"]
      - ["学科", "クレーン等の運転のための合図", "1.0h", "手・笛・無線合図"]
      - ["学科", "関係法令", "1.0h", "安衛則・クレーン則関係条項"]
      - ["実技", "玉掛けの方法", "3.0h", "用具点検・実玉掛け実習"]
      - ["実技", "クレーン等の運転のための合図", "1.0h", "実機による合図演練"]
    footnote: 出典：安衛則別表第5 ／ 学科5h ＋ 実技4h ＝ 計9h（1t未満用）

  # =========================================================
  # Slide 6 — フロー（4STEP）
  # =========================================================
  - layout: flow
    title: 玉掛け作業 4STEP
    title_en: SLING WORK FLOW
    intro: 安全な玉掛け作業の基本フロー
    steps:
      - num: "STEP 1"
        head: 質量目測
        body: 荷の形状・材質・体積から重量を見積もり、定格荷重と照合
      - num: "STEP 2"
        head: 玉掛け用具選定
        body: 安全係数（ワイヤロープ6以上、スリング7以上）に基づき適切な用具を選定
      - num: "STEP 3"
        head: 玉掛け
        body: 重心位置・吊り角度（60度以内推奨）・養生材を考慮し確実に掛ける
      - num: "STEP 4"
        head: 合図・吊り上げ
        body: 地切り後一旦停止、安定確認後に本吊り。退避位置を確保した上で合図

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 用具点検と合図のポイント
    title_en: INSPECTION & SIGNAL POINTS
    left_head: 玉掛け用具点検 4ポイント
    left_subhead: EQUIPMENT INSPECTION
    left_items:
      - head: ワイヤロープ素線切断率
        body: 1よりの間で素線数の10%以上切断は使用禁止（クレーン則）
      - head: フック・金具の変形
        body: 開口部の広がり・摩耗・亀裂は廃棄。安全レバー作動を確認
      - head: シャックル・リング
        body: ピンのねじ山損傷・ガタつき・規格外サイズ流用を排除
      - head: 繊維スリングの摩耗
        body: 縫製ほつれ・切創・薬品による劣化・表示ラベル不明は使用禁止
    right_head: 合図と退避 4ポイント
    right_subhead: SIGNAL & EVACUATION
    right_items:
      - head: 合図者は1名に限定
        body: 複数人の合図は混乱の元。指名された1名のみが運転者に合図
      - head: 運転者の視野内に立つ
        body: 死角に入らない位置取り、必要に応じて無線併用
      - head: 統一合図の使用
        body: クレーン則に基づく標準手合図・笛合図を事業場内で統一
      - head: 吊り荷の下に入らない
        body: 巻き上げ・水平移動・着地時とも、吊り荷の真下・退避線内に立入禁止

  # =========================================================
  # Slide 8 — 5ステップ（玉掛け禁止事項）
  # =========================================================
  - layout: five_steps
    title: 玉掛け 5つの禁止事項
    title_en: FIVE PROHIBITIONS
    intro: 重大災害につながる典型的な禁止行為
    steps:
      - num: "01"
        head: 共づり（共吊り）
        body: 1本のフックに別々の荷を二段掛けすると重心がずれて落下リスク
      - num: "02"
        head: ねじれ・キンク使用
        body: ワイヤロープ・スリングのねじれは強度を著しく低下させる
      - num: "03"
        head: 片荷（不均等吊り）
        body: 重心からずれた掛け方は荷の傾き・脱落・スイングの原因
      - num: "04"
        head: 衝撃荷重をかける
        body: 急激な巻き上げ・引きずり起こしは定格の数倍の荷重が発生
      - num: "05"
        head: 人の頭上を通す
        body: 吊り荷の経路は人の上を避ける。退避誘導後に移動

  # =========================================================
  # Slide 9 — 4項目（責務分担）
  # =========================================================
  - layout: duties
    title: 運転者・玉掛け者の責務分担
    title_en: ROLES & DUTIES
    intro: クレーン等安全規則・安衛法に基づく役割と事業者の管理責任
    items:
      - num: "01"
        head: クレーン運転者の責務
        body: 運転資格の保有、始業前点検、合図の確認、定格荷重の遵守、急操作の回避
      - num: "02"
        head: 玉掛け者の責務
        body: 用具点検、質量目測、確実な玉掛け、合図、地切り確認、退避誘導
      - num: "03"
        head: 事業者の管理責任
        body: 特別教育の実施、年次・月次・始業前点検の実施、用具の管理台帳整備
      - num: "04"
        head: 定期自主検査・記録
        body: クレーン則に基づく定期自主検査、玉掛け用具点検記録を3年以上保存

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 1t未満は本特別教育で従事可
        body: 1t以上は技能講習（クレーン則第222条）が必要
      - num: "02"
        head: 質量目測と用具選定が起点
        body: 安全係数を満たす用具を選び、吊り角度60度以内を意識
      - num: "03"
        head: 始業前点検と廃棄基準
        body: ワイヤ素線切断率10%・フック変形・スリング摩耗で即廃棄
      - num: "04"
        head: 5つの禁止事項を徹底
        body: 共づり・ねじれ・片荷・衝撃・頭上通過は重大災害の典型
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
