meta:
  id: shindou
  title: 振動障害予防 労働衛生教育
  subtitle: チェーンソー・工具対応コース
  english_title: HAND-ARM VIBRATION SYNDROME PREVENTION
  english_subtitle: Workplace Occupational Health Education
  legal_basis: "基発0810第1号「振動工具取扱作業者に対する安全衛生教育の推進について」 ／ 振動障害予防のための作業管理指針準拠"
  duration: 約2時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: "https://safe-ai-site.vercel.app/contact"
  output: shindou.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 労働衛生教育
    english_title: HAND-ARM VIBRATION SYNDROME PREVENTION
    title: 振動障害予防 労働衛生教育
    subtitle: チェーンソー・工具対応コース
    legal: 基発0810第1号準拠 ／ 約2時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ今、振動障害予防か
        body: 振動障害認定の動向と高齢化現場でのリスク
      - num: "02"
        head: 振動障害対策の4要素
        body: 工具選定・ばく露時間管理・防振保温・健康管理
      - num: "03"
        head: 工具別ばく露管理
        body: 3軸合成値a(8)と日振動ばく露限界値5.0m/s²
      - num: "04"
        head: 振動障害予防 4STEP
        body: 工具評価→ばく露計算→時間管理→健診
      - num: "05"
        head: 工具選定と保温・血行管理
        body: 低振動工具の活用と末梢循環保護
      - num: "06"
        head: 健康管理5ステップと事業者責務
        body: 特殊健診6月以内ごと、記録5年保存

  # =========================================================
  # Slide 3 — 大数字 + 工具別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ今、振動障害予防か
    title_en: WHY NOW
    big_value: "85"
    big_unit: "%"
    big_caption: 振動障害労災認定における手腕系振動工具（チェーンソー含む）が占める比率
    source: 厚生労働省「業務上疾病発生状況等調査」
    chart_title: 工具種別 振動障害認定の傾向（相対値）
    chart_data:
      - label: チェーンソー
        value: 1.00
      - label: ピックハンマー
        value: 0.62
      - label: サンダー・グラインダー
        value: 0.48
      - label: 削岩機
        value: 0.34
      - label: その他振動工具
        value: 0.21
    chart_note: ※チェーンソー作業の認定件数を1.00として正規化した工具別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（振動障害対策4要素）
  # =========================================================
  - layout: four_quadrant
    title: 振動障害対策の4要素
    title_en: FOUR PILLARS
    intro: 振動障害予防のための作業管理指針および基発0810第1号に基づく使用者の取組み
    quadrants:
      - num: "01"
        head: 工具選定（低振動）
        body: 低振動工具の採用、防振機構付き製品の優先、メーカー公表の3軸合成値で比較選定
      - num: "02"
        head: ばく露時間管理
        body: 日振動ばく露量A(8)の算定、限界値5.0m/s²未満の維持、対策値2.5m/s²の運用
      - num: "03"
        head: 防振手袋・保温
        body: 防振手袋の支給と訓練、寒冷下作業の保温対策、湿潤回避と血行維持
      - num: "04"
        head: 健康管理・健診
        body: 雇入時・特殊健診6月以内ごと、自覚症状の早期把握、産業医連携と就業判定

  # =========================================================
  # Slide 5 — 表（工具別ばく露管理）
  # =========================================================
  - layout: table
    title: 工具別ばく露管理
    title_en: TOOL EXPOSURE MANAGEMENT
    headers: ["工具区分", "代表加速度", "1日許容時間", "主な対策"]
    rows:
      - ["チェーンソー", "5〜8 m/s²", "2時間以内（1連続10分以内）", "低振動機種、刃の点検、休憩設計"]
      - ["ピックハンマー", "10〜25 m/s²", "概ね30分〜1時間", "防振ハンドル、保持力低減、交替制"]
      - ["削岩機", "8〜20 m/s²", "概ね1〜2時間", "防振機構、姿勢保持、台座固定"]
      - ["サンダー・グラインダー", "3〜8 m/s²", "概ね2〜4時間", "防振パッド、低速モード、定期点検"]
      - ["インパクトレンチ", "3〜10 m/s²", "概ね2〜3時間", "トルク管理、適正工具選定、休憩"]
    footnote: 出典：振動障害予防のための作業管理指針 ／ 基発0810第1号 ／ ISO 5349準拠の概算値

  # =========================================================
  # Slide 6 — フロー（振動障害予防 4STEP）
  # =========================================================
  - layout: flow
    title: 振動障害予防 4STEP
    title_en: PREVENTION FLOW
    intro: 工具・作業ごとに評価し、ばく露を限界値以下に抑える運用へ
    steps:
      - num: "STEP 1"
        head: 工具評価
        body: メーカー値・実測の3軸合成値で工具を評価、低振動工具へ更新
      - num: "STEP 2"
        head: ばく露計算
        body: 日振動ばく露量A(8)を算定、限界値5.0m/s²と対策値2.5m/s²で判定
      - num: "STEP 3"
        head: 時間管理
        body: 1日の作業時間・1連続作業時間を制限し、作業日報で実績を確認
      - num: "STEP 4"
        head: 健康診断
        body: 特殊健診6月以内ごと、所見者は産業医判断で配置転換・就業制限

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 工具選定と保温・血行管理
    title_en: TOOL & CIRCULATION
    left_head: 振動工具選定 4ポイント
    left_subhead: TOOL SELECTION
    left_items:
      - head: 低振動工具の採用
        body: 同等性能で振動加速度の小さい機種を優先選定
      - head: 防振機構付き製品
        body: 防振ハンドル・防振マウント・カウンターウェイト搭載品
      - head: メーカー公表値で比較
        body: 3軸合成値（m/s²）をカタログで確認し購入仕様に明記
      - head: 定期点検と整備
        body: 刃・ベアリング・防振ゴムの摩耗で振動増加。点検記録を残す
    right_head: 保温・血行管理 4ポイント
    right_subhead: WARMTH & CIRCULATION
    right_items:
      - head: 防振手袋の着用
        body: 用途に応じた手袋を支給し、装着方法を訓練
      - head: 保温と防寒対策
        body: 末梢循環を維持。寒冷下では休憩室での復温時間を確保
      - head: こまめな休憩
        body: 1連続作業10〜30分ごとに小休止、手指のリラックス
      - head: 禁煙・健康習慣
        body: 喫煙は末梢循環を悪化させる。禁煙指導と運動・栄養指導

  # =========================================================
  # Slide 8 — 5ステップ（健康管理）
  # =========================================================
  - layout: five_steps
    title: 健康管理 5ステップ
    title_en: HEALTH MANAGEMENT
    intro: 雇入時から退職後まで一貫した健康管理で振動障害を早期発見・予防する
    steps:
      - num: "01"
        head: 雇入時健診
        body: 配置前にレイノー現象・神経症状・既往歴を確認し就業可否を判断
      - num: "02"
        head: 特殊健診（6月以内ごと）
        body: 振動工具取扱業務従事者は法定特殊健診を年2回実施
      - num: "03"
        head: 自覚症状の把握
        body: 手指のしびれ・冷感・白色化・痛みの早期申告体制
      - num: "04"
        head: 産業医連携
        body: 所見者は産業医が判定、配置転換・就業制限・要医療を決定
      - num: "05"
        head: 記録の保存（5年）
        body: 健診結果・ばく露記録・教育記録を5年以上保存し追跡可能化

  # =========================================================
  # Slide 9 — 4項目（事業者の責務）
  # =========================================================
  - layout: duties
    title: 事業者の責務
    title_en: EMPLOYER'S DUTIES
    intro: 安衛法第59条・第66条および振動障害予防のための作業管理指針に基づく取組み
    items:
      - num: "01"
        head: ばく露時間の管理
        body: チェーンソーは2時間/日上限。日報で作業時間を実測・記録
      - num: "02"
        head: 特殊健診の実施
        body: 振動業務従事者に6月以内ごとの特殊健診を実施し、結果を保存
      - num: "03"
        head: 教育の計画的実施
        body: 雇入時・配置替時に振動・健康影響・対策の教育、年1回再教育
      - num: "04"
        head: 記録の保存（5年）
        body: 教育・健診・ばく露記録を5年以上保存、是正履歴を残す

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 振動障害は累積ばく露で発症
        body: 限界値5.0m/s²・対策値2.5m/s²の運用が要
      - num: "02"
        head: 工具選定と時間管理が両輪
        body: 低振動工具へ更新し、日振動ばく露量A(8)を管理
      - num: "03"
        head: 保温と血行が末梢を守る
        body: 防振手袋・保温・禁煙で循環悪化を防ぐ
      - num: "04"
        head: 健診と記録で早期発見
        body: 特殊健診6月以内ごと、記録5年保存で追跡
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
