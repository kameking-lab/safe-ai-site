meta:
  id: souon
  title: 騒音障害防止 労働衛生教育
  subtitle: 令和5年改訂ガイドライン対応コース
  english_title: NOISE-INDUCED HEARING LOSS PREVENTION
  english_subtitle: Workplace Occupational Health Education
  legal_basis: "基発0420第2号「騒音障害防止のためのガイドライン」（令和5年4月20日改訂）準拠"
  duration: 約1.5時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: "https://safe-ai-site.vercel.app/contact"
  output: souon.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 労働衛生教育
    english_title: NOISE-INDUCED HEARING LOSS PREVENTION
    title: 騒音障害防止 労働衛生教育
    subtitle: 令和5年改訂ガイドライン対応コース
    legal: 基発0420第2号（令和5年改訂）準拠 ／ 約1.5時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ今、騒音障害防止か
        body: 騒音性難聴の不可逆性と令和5年改訂の背景
      - num: "02"
        head: 騒音対策の4要素
        body: 作業環境管理・作業管理・聴覚保護具・健康管理
      - num: "03"
        head: 等価騒音レベル管理区分
        body: LAeq,8hに基づく第I/II/III管理区分の判定
      - num: "04"
        head: 騒音管理 4STEP
        body: 測定→区分判定→低減対策→聴覚保護
      - num: "05"
        head: 騒音源対策と聴覚保護具
        body: 発生源・伝播対策とNRR/SNRに基づく選定
      - num: "06"
        head: 聴力検査5ステップと事業者責務
        body: 雇入→定期→特殊→所見→保健指導

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ今、騒音障害防止か
    title_en: WHY NOW
    big_value: "85"
    big_unit: dB
    big_caption: 騒音障害防止ガイドライン 管理区分Iの境界レベル
    source: 厚生労働省「業務上疾病発生状況等調査」
    chart_title: 業種別 騒音性難聴認定の傾向（相対値）
    chart_data:
      - label: 製造業
        value: 1.00
      - label: 建設業
        value: 0.71
      - label: 運輸業
        value: 0.38
      - label: 廃棄物処理
        value: 0.24
      - label: その他
        value: 0.18
    chart_note: ※製造業の認定件数を1.00として正規化した業種別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（騒音対策4要素）
  # =========================================================
  - layout: four_quadrant
    title: 騒音対策の4要素
    title_en: FOUR PILLARS
    intro: 令和5年4月20日改訂「騒音障害防止のためのガイドライン」（基発0420第2号）に基づく取組み
    quadrants:
      - num: "01"
        head: 作業環境管理
        body: 6月以内ごとの作業環境測定、A・B測定の実施、管理区分判定、結果の掲示・記録
      - num: "02"
        head: 作業管理
        body: 騒音作業の時間制限・配置、休憩取得、表示・標識、立入禁止・許可制の運用
      - num: "03"
        head: 聴覚保護具
        body: NRR/SNRに基づく選定、装着訓練、定期点検・交換、適合確認とフィットテスト
      - num: "04"
        head: 健康管理
        body: 雇入時・定期・特殊健診（聴力検査）、所見者の保健指導、産業医連携

  # =========================================================
  # Slide 5 — 表（等価騒音レベル管理区分）
  # =========================================================
  - layout: table
    title: 等価騒音レベル管理区分
    title_en: NOISE MANAGEMENT CATEGORIES
    headers: ["管理区分", "LAeq,8h", "措置", "聴力検査"]
    rows:
      - ["第I管理区分", "85dB未満", "現状維持。継続測定で監視", "雇入時・定期健診"]
      - ["第II管理区分", "85dB以上90dB未満", "聴覚保護具の使用、表示、教育、低減対策の検討", "雇入時・定期＋特殊健診"]
      - ["第III管理区分", "90dB以上", "発生源・伝播対策の実施、保護具着用義務、立入制限", "雇入時・定期＋特殊健診（強化）"]
      - ["強烈な騒音発生場所", "概ね90dB以上の継続作業", "施設・設備の改善、保護具着用、教育徹底", "特殊健診を6月以内ごと"]
      - ["著しい騒音発生場所", "概ね85dB以上", "保護具支給、表示、作業時間管理", "定期＋特殊健診"]
    footnote: 出典：基発0420第2号「騒音障害防止のためのガイドライン」（令和5年改訂）より要約

  # =========================================================
  # Slide 6 — フロー（騒音管理 4STEP）
  # =========================================================
  - layout: flow
    title: 騒音管理 4STEP
    title_en: NOISE MANAGEMENT FLOW
    intro: ガイドラインの運用は「測定起点」。実態把握から低減・保護まで一貫運用
    steps:
      - num: "STEP 1"
        head: 騒音測定
        body: 6月以内ごとに作業環境測定。LAeq,8hを把握し記録・掲示
      - num: "STEP 2"
        head: 区分判定
        body: 第I/II/III管理区分を判定し、必要措置を決定
      - num: "STEP 3"
        head: 低減対策
        body: 発生源・伝播・受音の順で対策。設備更新・遮音・吸音・消音器
      - num: "STEP 4"
        head: 聴覚保護
        body: NRR/SNRに基づく保護具選定・装着訓練・適合確認

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 騒音源対策と聴覚保護
    title_en: SOURCE & PROTECTION
    left_head: 騒音源対策 4ポイント
    left_subhead: NOISE SOURCE CONTROL
    left_items:
      - head: 発生源対策（最優先）
        body: 低騒音機械への更新、防振・制振、適切な保守整備
      - head: 伝播経路対策
        body: 遮音壁・防音パネル・吸音材で伝播を遮断
      - head: 消音器・サイレンサー
        body: 排気・吸気・送風機の消音器設置で騒音低減
      - head: 覆い・密閉化
        body: 騒音発生機器の囲い込み、ブース化で受音側を保護
    right_head: 聴覚保護具 4ポイント
    right_subhead: HEARING PROTECTION
    right_items:
      - head: NRR/SNRで選定
        body: 騒音レベルと低減量から適合する保護具を選定
      - head: 装着訓練
        body: 正しい装着方法を教育。フィットテストで適合確認
      - head: 定期点検・交換
        body: 耳栓は使い捨て・耳覆いはクッション劣化で交換
      - head: 選定基準の文書化
        body: 作業区分ごとの保護具仕様を明文化し統一運用

  # =========================================================
  # Slide 8 — 5ステップ（聴力検査）
  # =========================================================
  - layout: five_steps
    title: 聴力検査 5ステップ
    title_en: AUDIOMETRY STEPS
    intro: 騒音性難聴は不可逆。早期発見と保健指導で進行を抑える
    steps:
      - num: "01"
        head: 雇入時聴力検査
        body: 配置前のベースライン取得。1000Hz・4000Hzの聴力を測定
      - num: "02"
        head: 定期健診（年1回）
        body: 一般定期健診の聴力検査で経年変化を把握
      - num: "03"
        head: 特殊健診（6月以内ごと）
        body: 騒音作業従事者に対し250〜8000Hzの精密聴力検査を実施
      - num: "04"
        head: 所見者対応
        body: 4000Hz中心の閾値上昇は要注意。産業医判定で就業判断
      - num: "05"
        head: 保健指導
        body: 保護具着用の徹底、配置転換、生活面での騒音回避指導

  # =========================================================
  # Slide 9 — 4項目（事業者の責務）
  # =========================================================
  - layout: duties
    title: 事業者の責務
    title_en: EMPLOYER'S DUTIES
    intro: 安衛法第65条・第66条および基発0420第2号（令和5年改訂）に基づく取組み
    items:
      - num: "01"
        head: 作業環境測定の実施
        body: 6月以内ごとに測定し、結果を記録・掲示・労働者へ周知
      - num: "02"
        head: 聴覚保護具の支給
        body: 騒音作業区分に応じた保護具を支給し、装着訓練を実施
      - num: "03"
        head: 聴力検査の実施
        body: 雇入時・定期・特殊健診を法定どおり実施し、所見者は保健指導
      - num: "04"
        head: 記録の保存
        body: 測定・健診・教育記録を法定期間（健診は5年）保存し是正履歴を残す

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 騒音性難聴は不可逆
        body: 予防が唯一の対策。早期発見で進行を抑える
      - num: "02"
        head: 測定起点で4要素を運用
        body: LAeq,8hで管理区分を決め、対策を選択する
      - num: "03"
        head: 発生源対策を最優先に
        body: 保護具は最後の砦。発生源・伝播・受音の順で
      - num: "04"
        head: 健診と記録で継続改善
        body: 特殊健診6月以内ごと、保健指導で進行抑制
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
