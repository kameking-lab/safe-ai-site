meta:
  id: chemical-ra
  title: 化学物質RA実務教育
  subtitle: 自律的化学物質管理対応コース
  english_title: CHEMICAL RISK ASSESSMENT PRACTICAL TRAINING
  english_subtitle: Autonomous Chemical Management Compliance Course
  legal_basis: "安衛法第57条の3 ／ 安衛則第34条の2の7 ／ 2.5〜4時間 ／ 自律的管理制度（2024年4月施行・2026年4月完全施行）対応"
  duration: "約2.5〜4時間"
  supervisor: ANZEN AI
  contact: "https://safe-ai-site.vercel.app/contact"
  output: chemical-ra.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 化学物質管理教育
    english_title: CHEMICAL RISK ASSESSMENT
    title: 化学物質RA実務教育
    subtitle: 自律的化学物質管理対応コース
    legal: "安衛法第57条の3準拠 ／ 約2.5〜4時間"
    supervisor: ANZEN AI

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ今、化学物質RAか
        body: 自律的管理制度への移行と対象物質拡大の背景
      - num: "02"
        head: 自律管理の4要素
        body: 化学物質管理者・RA・ばく露低減・健康障害防止
      - num: "03"
        head: 教育カリキュラム時間割
        body: 基礎・RA手法・ばく露評価・リスク低減の構成
      - num: "04"
        head: RA 4STEPと国際情報源
        body: GHS／SDSを活用した特定からリスク低減まで
      - num: "05"
        head: RA手法とリスク低減4階層
        body: ECETOC TRA等の手法と排除→代替→工学→PPE
      - num: "06"
        head: 化学物質管理者の責務
        body: 5責務と事業者の法定責務（記録保存等）

  # =========================================================
  # Slide 3 — 大数字 + 管理項目別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ今、化学物質RAか
    title_en: WHY NOW
    big_value: "20"
    big_unit: 倍
    big_caption: 化学物質RA対象物が従来比で拡大した倍率（約120→約2,900物質）
    source: 厚生労働省「化学物質規制の見直し」2022年5月公布
    chart_title: 自律管理 主要管理項目の取組み状況（相対値）
    chart_data:
      - label: SDS交付・受領
        value: 1.00
      - label: ラベル表示確認
        value: 0.92
      - label: RA実施
        value: 0.68
      - label: ばく露評価
        value: 0.41
      - label: 健康診断
        value: 0.33
    chart_note: ※SDS交付・受領を1.00として正規化した管理項目別取組み傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（自律管理4要素）
  # =========================================================
  - layout: four_quadrant
    title: 自律的化学物質管理の4要素
    title_en: FOUR PILLARS
    intro: 2024年4月施行・2026年4月完全施行の自律的管理制度が事業者に求める取組み
    quadrants:
      - num: "01"
        head: 化学物質管理者の選任
        body: リスクアセスメント対象物を製造・取扱う事業場で選任義務。職務は管理計画の策定・教育・記録（安衛則第12条の5）
      - num: "02"
        head: リスクアセスメントの実施
        body: 安衛法第57条の3に基づく対象物のRA。新規採用・作業変更時にも実施し記録を保存
      - num: "03"
        head: ばく露低減措置
        body: 濃度基準値以下への管理、ばく露の最小化、工学的対策・呼吸用保護具の適切な選定
      - num: "04"
        head: 健康障害防止措置
        body: リスクに応じた健康診断、がん等遅発性疾病への対応、漏えい・異常時の応急措置

  # =========================================================
  # Slide 5 — 表（カリキュラム時間割）
  # =========================================================
  - layout: table
    title: 教育カリキュラム時間割
    title_en: TRAINING CURRICULUM
    headers: ["科目", "時間", "主な内容", "形式"]
    rows:
      - ["化学物質管理の基礎", "0.5h", "自律管理制度、安衛法改正、対象物拡大の概要", "講義"]
      - ["RA手法の基礎", "1.0h", "ECETOC TRA、CREATE-SIMPLE、CB、実測の使い分け", "講義+演習"]
      - ["ばく露評価の実務", "0.75h", "濃度基準値、SDS活用、作業環境測定との違い", "講義+ケース"]
      - ["リスク低減措置", "1.0h", "排除→代替→工学→PPEの4階層、呼吸用保護具選定", "講義+グループ演習"]
      - ["記録・教育・改善", "0.75h", "記録の保存期間、再評価、関係者への周知", "講義+討議"]
    footnote: 出典：安衛法第57条の3／安衛則第34条の2の7 を整理。合計2.5〜4時間。

  # =========================================================
  # Slide 6 — フロー（RA 4STEP）
  # =========================================================
  - layout: flow
    title: 化学物質リスクアセスメント 4STEP
    title_en: RISK ASSESSMENT FLOW
    intro: GHS分類・SDS（安全データシート）等の国際化学物質情報源を活用した実務手順
    steps:
      - num: "STEP 1"
        head: 化学物質の特定
        body: 取扱物質一覧化、SDS入手、GHS分類とラベル表示の確認
      - num: "STEP 2"
        head: ばく露評価
        body: 取扱量・作業時間・換気条件からばく露濃度を推定
      - num: "STEP 3"
        head: リスクの見積り
        body: 濃度基準値・有害性区分との比較で優先度を判定
      - num: "STEP 4"
        head: 対策実施・記録
        body: 排除・代替・工学・PPEの順で選定し記録を保存

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: RA手法とリスク低減4階層
    title_en: METHODS & HIERARCHY
    left_head: RA手法 4種類
    left_subhead: ASSESSMENT METHODS
    left_items:
      - head: ECETOC TRA
        body: 取扱量・作業条件からばく露を推定する欧州ツール。スクリーニングに有効
      - head: CREATE-SIMPLE
        body: 厚労省提供の簡易ツール。中小規模事業場でも入力項目が少なく使いやすい
      - head: コントロール・バンディング
        body: GHS区分と取扱量から管理レベルを定性的に判定。専門知識不要で導入容易
      - head: 実測（個人ばく露測定等）
        body: ばく露濃度を直接測定。精度は最も高いが費用と時間を要する
    right_head: リスク低減4階層
    right_subhead: HIERARCHY OF CONTROLS
    right_items:
      - head: 排除（Elimination）
        body: 当該化学物質の使用を中止。最も確実な低減策
      - head: 代替（Substitution）
        body: 有害性のより低い物質や工程に切り替える
      - head: 工学的対策（Engineering）
        body: 局所排気装置、密閉化、自動化により発散源を制御
      - head: 保護具（PPE）
        body: 呼吸用・化学防護手袋等を最終手段として併用

  # =========================================================
  # Slide 8 — 5ステップ（化学物質管理者の5責務）
  # =========================================================
  - layout: five_steps
    title: 化学物質管理者の5責務
    title_en: 5 DUTIES
    intro: 安衛則第12条の5に基づき、選任から改善までを年間サイクルで運用する
    steps:
      - num: "01"
        head: 選任・体制整備
        body: 事業場ごとに選任し、職務範囲と権限を明文化
      - num: "02"
        head: 管理計画の策定
        body: RA計画、ばく露低減計画、教育計画を年間ロードマップ化
      - num: "03"
        head: 記録の作成・保存
        body: RA記録、ばく露評価、健診結果を法定期間保存
      - num: "04"
        head: 関係者への教育
        body: 取扱者・管理監督者へSDS内容と取扱注意事項を周知
      - num: "05"
        head: 改善・再評価
        body: 作業変更・物質変更時の再RAと是正措置の実施

  # =========================================================
  # Slide 9 — 4項目（事業者の法定責務）
  # =========================================================
  - layout: duties
    title: 事業者の法定責務
    title_en: EMPLOYER'S LEGAL DUTIES
    intro: 安衛法第57条・第57条の3および関係省令に基づく事業者の取組み
    items:
      - num: "01"
        head: SDS交付・ラベル表示
        body: 安衛法第57条・第57条の2に基づく譲渡提供時のSDS交付とGHSラベル表示
      - num: "02"
        head: ばく露の最小化
        body: 濃度基準値以下に管理し、可能な限りばく露を低減する努力義務
      - num: "03"
        head: 健康診断・健康管理
        body: リスクに応じた健康診断、がん原性物質取扱者への配慮を実施
      - num: "04"
        head: 記録の保存
        body: RA記録は3年以上、がん原性物質関連の記録は30年保存（一部物質）

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 自律管理は4要素で回す
        body: 管理者選任・RA・ばく露低減・健康障害防止を一体運用
      - num: "02"
        head: SDS／GHSが実務の起点
        body: 国際化学物質情報源を活用し4STEPで判断
      - num: "03"
        head: 4階層で確実に低減
        body: 排除→代替→工学→PPEの順を崩さず選定
      - num: "04"
        head: 記録保存は物質ごとに
        body: RA記録は3年以上、がん原性物質は30年保存（一部物質）
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI
