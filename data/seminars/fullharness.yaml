meta:
  id: fullharness
  title: フルハーネス型 特別教育
  subtitle: 墜落制止用器具を用いる業務
  english_title: FULL-BODY HARNESS SPECIAL EDUCATION
  english_subtitle: Special Education for Fall Arrest Equipment
  legal_basis: 安衛則第36条第41号 ／ 学科4.5時間＋実技1.5時間 ／ 厚生労働省告示第11号（2018年）準拠
  duration: 約6時間
  supervisor: ANZEN AI
  contact: "https://safe-ai-site.vercel.app/contact"
  output: fullharness.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: FULL-BODY HARNESS SPECIAL EDUCATION
    title: フルハーネス型 特別教育
    subtitle: 墜落制止用器具を用いる業務
    legal: 安衛則第36条第41号準拠 ／ 約6時間
    supervisor: ANZEN AI

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: 墜落災害の現状と法改正
        body: 2019年2月施行の用語変更とフルハーネス原則化の背景
      - num: "02"
        head: 学科4区分の全体像
        body: 作業／器具／災害防止／関係法令の体系
      - num: "03"
        head: 業種別の墜落リスク
        body: 建設・製造・運輸・電気通信・林業の傾向
      - num: "04"
        head: 装着・点検・使用・保管の4STEP
        body: 日常運用で守る基本フロー
      - num: "05"
        head: ランヤード選定と装着のポイント
        body: 自由落下距離・振り子・第一種/第二種の理解
      - num: "06"
        head: 墜落時対応と元方・使用者の責務
        body: 救助5ステップと法定義務の整理

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜフルハーネスが原則か
    title_en: WHY FULL-BODY HARNESS
    big_value: "40"
    big_unit: "%"
    big_caption: 建設業 死亡災害に占める墜落・転落の比率
    source: 厚生労働省「労働災害発生状況」
    chart_title: 墜落・転落死亡災害 業種別件数（相対値）
    chart_data:
      - label: 建設業
        value: 1.00
      - label: 製造業
        value: 0.32
      - label: 陸上運輸
        value: 0.21
      - label: 林業
        value: 0.18
      - label: 電気通信
        value: 0.09
    chart_note: ※建設業の発生件数を1.00として正規化した業種別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（学科法定4区分）
  # =========================================================
  - layout: four_quadrant
    title: 学科 法定4区分
    title_en: FOUR LEGAL TOPICS
    intro: 厚生労働省告示第11号が定める特別教育のカリキュラム体系
    quadrants:
      - num: "01"
        head: 作業に関する知識
        body: 作業に用いる設備の種類・構造・取扱い、作業に伴う災害とその防止方法（1時間）
      - num: "02"
        head: 墜落制止用器具に関する知識
        body: フルハーネス・ランヤード・接続器具の構造、点検・整備、使用方法（2時間）
      - num: "03"
        head: 労働災害の防止に関する知識
        body: 墜落による労働災害の防止のための措置、安全帯使用上の留意点（1時間）
      - num: "04"
        head: 関係法令
        body: 安衛法、安衛令、安衛則中の関係条項、構造規格、ガイドライン（0.5時間）

  # =========================================================
  # Slide 5 — 表（カリキュラム時間割）
  # =========================================================
  - layout: table
    title: カリキュラム時間割
    title_en: CURRICULUM TIMETABLE
    headers: ["区分", "科目", "時間", "主な内容"]
    rows:
      - ["学科", "作業に関する知識", "1.0h", "作業設備・作業手順・災害事例"]
      - ["学科", "墜落制止用器具に関する知識", "2.0h", "構造・規格・点検・選定基準"]
      - ["学科", "労働災害の防止に関する知識", "1.0h", "墜落防止措置・救助・応急処置"]
      - ["学科", "関係法令", "0.5h", "安衛則第36条第41号関連・構造規格"]
      - ["実技", "墜落制止用器具の使用方法", "1.5h", "装着・取付け・点検実習"]
    footnote: 出典：厚生労働省告示第11号（2018年）／ 学科4.5h ＋ 実技1.5h ＝ 計6h

  # =========================================================
  # Slide 6 — フロー（4STEP）
  # =========================================================
  - layout: flow
    title: 装着・点検・使用・保管 4STEP
    title_en: DAILY OPERATION FLOW
    intro: フルハーネスの日常運用で守るべき基本フロー
    steps:
      - num: "STEP 1"
        head: 装着
        body: 体型に合わせ、ベルトのねじれ・たるみなく胸・腿・肩を確実に固定
      - num: "STEP 2"
        head: 点検
        body: 縫製・金具・ランヤード・ショックアブソーバの損傷を作業前に目視確認
      - num: "STEP 3"
        head: 使用
        body: 取付設備は腰より高い位置（D環高さ以上）に確実にフック掛け
      - num: "STEP 4"
        head: 保管
        body: 直射日光・高温多湿・薬品を避けて保管。落下衝撃を受けた製品は廃棄

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: ランヤード選定と装着のポイント
    title_en: LANYARD & FITTING POINTS
    left_head: ランヤード選定 4ポイント
    left_subhead: LANYARD SELECTION
    left_items:
      - head: 自由落下距離を確認
        body: 取付位置とD環高さから必要落下距離（クリアランス）を計算
      - head: 振り子（スイング）リスク
        body: 取付点は作業位置の真上が原則。横方向ずれは衝突リスク
      - head: 最大衝撃荷重 6.0kN以下
        body: ショックアブソーバの伸び量を含めて選定（構造規格）
      - head: 第一種／第二種の使い分け
        body: 第一種は腰高さ以上、第二種は足元（4kN）取付け対応
    right_head: 装着・取付け 4ポイント
    right_subhead: FITTING & ANCHORING
    right_items:
      - head: 胸ベルトは胸骨中央
        body: ずれると吊り下がり時に頚部圧迫や逸脱の恐れ
      - head: 腿ベルトの締め込み
        body: 指2本が入る程度。緩みは墜落時の腿部損傷原因
      - head: 取付設備の強度
        body: 一人当たり22.0kN以上の強度がある構造物・親綱に掛ける
      - head: フック向きと外れ止め
        body: ロック機構を毎回確認。手すり・足場材への直掛けは避ける

  # =========================================================
  # Slide 8 — 5ステップ（墜落時対応）
  # =========================================================
  - layout: five_steps
    title: 墜落時対応 5ステップ
    title_en: POST-FALL RESPONSE
    intro: 宙吊り（サスペンショントラウマ）防止のため、迅速な救助が必須
    steps:
      - num: "01"
        head: 発見・呼びかけ
        body: 即座に周囲へ知らせ、被災者の意識・呼吸を確認
      - num: "02"
        head: 119通報
        body: 救急要請。建物階層・取付高さなど墜落状況を伝達
      - num: "03"
        head: 二次災害防止
        body: 周囲の落下物・電源を確認、救助者の自己確保を実施
      - num: "04"
        head: 救助・降下
        body: レスキューシステムまたは高所作業車で速やかに地上へ
      - num: "05"
        head: 応急処置・搬送
        body: 宙吊り後は急に水平に寝かせず、半座位で経過観察し搬送

  # =========================================================
  # Slide 9 — 4項目（元方・使用者の責務）
  # =========================================================
  - layout: duties
    title: 元方・使用者の責務
    title_en: PRIME CONTRACTOR & EMPLOYER DUTIES
    intro: 安衛法第59条第3項（特別教育）・第30条（元方事業者の措置）に基づく取組み
    items:
      - num: "01"
        head: 特別教育の実施・記録
        body: 6.75m超（建設業5m超）の作業従事者に法定6時間を実施し記録3年保存
      - num: "02"
        head: 作業計画と取付設備の設定
        body: 作業床・親綱・取付金具を計画段階で設計し、強度22kN以上を確保
      - num: "03"
        head: 器具の点検と廃棄基準
        body: 始業前点検・月次点検を実施。落下衝撃品・破損品は即廃棄
      - num: "04"
        head: 救助体制の整備
        body: レスキュープランの策定、救助器具の常備、関係請負人への周知

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 6.75m超は原則フルハーネス
        body: 建設業は5m超推奨。胴ベルトは限定用途のみ
      - num: "02"
        head: 取付高さとクリアランスが命
        body: D環高さ・自由落下距離・伸び量の総和を必ず確認
      - num: "03"
        head: 始業前点検を習慣化
        body: 縫製・金具・アブソーバを毎日確認、衝撃品は即廃棄
      - num: "04"
        head: 救助体制まで含めて教育
        body: 宙吊り対応・レスキュープランを事業場で整備
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI
