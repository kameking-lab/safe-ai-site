meta:
  id: teiatsu-denki
  title: 低圧電気取扱い 特別教育
  subtitle: 充電部・停電作業対応コース
  english_title: LOW-VOLTAGE ELECTRICAL WORK SPECIAL EDUCATION
  english_subtitle: Special Education for Low-Voltage Electrical Operations
  legal_basis: 安衛則第36条第4号 ／ 7時間以上（充電部活線作業を行う場合は実技7時間追加で計14時間）
  duration: 約7〜14時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: https://safe-ai-site.vercel.app/contact
  output: teiatsu-denki.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: LOW-VOLTAGE ELECTRICAL WORK SPECIAL EDUCATION
    title: 低圧電気取扱い 特別教育
    subtitle: 充電部・停電作業対応コース
    legal: 安衛則第36条第4号準拠 ／ 7〜14時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ低圧電気教育か
        body: 感電死傷の多くが低圧（750V以下）で発生する事実
      - num: "02"
        head: 学科カリキュラムの4要素
        body: 基礎知識・配線設備・安全作業・関係法令の法定区分
      - num: "03"
        head: 7時間/14時間の時間割
        body: 活線・活線近接の有無で実技時間が変わる
      - num: "04"
        head: 停電作業 4STEP
        body: 検電→開放・施錠→接地→作業の鉄則手順
      - num: "05"
        head: 感電のメカニズムと保護具
        body: 通電経路と絶縁工具・絶縁用保護具の使い分け
      - num: "06"
        head: ヒューマンエラー防止と責務
        body: 5ステップの再発防止と管理者責任の整理

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ低圧電気教育か
    title_en: WHY NOW
    big_value: "60"
    big_unit: "%"
    big_caption: 感電による死亡災害のうち低圧（750V以下）が占める比率
    source: 厚生労働省「労働災害発生状況」感電災害分析
    chart_title: 業種別 感電死傷災害の傾向（相対値）
    chart_data:
      - label: 建設業
        value: 1.00
      - label: 製造業
        value: 0.78
      - label: 電気・ガス・水道
        value: 0.42
      - label: 商業・サービス
        value: 0.31
      - label: 運輸・その他
        value: 0.18
    chart_note: ※建設業を1.00として正規化した業種別の概算傾向。

  # =========================================================
  # Slide 4 — 4象限カード（学科4要素）
  # =========================================================
  - layout: four_quadrant
    title: 学科カリキュラムの4要素
    title_en: FOUR PILLARS
    intro: 安衛則第36条第4号・特別教育規程第6条が定める低圧電気取扱い特別教育 学科科目
    quadrants:
      - num: "01"
        head: 低圧の電気に関する基礎知識
        body: 電圧・電流・電力、抵抗とオームの法則、交流と直流、感電の人体影響
      - num: "02"
        head: 低圧の電気設備に関する基礎知識
        body: 配線・開閉器・電動機・配電盤、絶縁・接地、電気機器の構造と用途
      - num: "03"
        head: 低圧用の安全作業用具
        body: 絶縁用保護具・絶縁用防具・活線作業用器具、検電器の使用と日常点検
      - num: "04"
        head: 低圧の活線・活線近接作業の方法と関係法令
        body: 充電電路の防護、停電作業手順、安衛法・安衛則・電気設備技術基準の要点

  # =========================================================
  # Slide 5 — 表（時間割）
  # =========================================================
  - layout: table
    title: 学科・実技 時間割
    title_en: CURRICULUM HOURS
    headers: ["項目", "区分", "時間", "主な内容"]
    rows:
      - ["低圧電気の基礎知識", "学科", "1.0h", "電圧・電流・感電の人体影響"]
      - ["低圧電気設備の基礎知識", "学科", "2.0h", "配線・開閉器・絶縁・接地"]
      - ["安全作業用具に関する基礎知識", "学科", "1.0h", "絶縁保護具・検電器の使用法"]
      - ["活線・活線近接作業の方法", "学科", "2.0h", "停電作業4STEP・防護方法"]
      - ["関係法令", "学科", "1.0h", "安衛則・電気設備技術基準の要点"]
      - ["低圧の活線作業及び活線近接作業の方法", "実技", "7.0h", "活線作業を行う場合のみ追加（合計14h）"]
    footnote: 出典：労働安全衛生規則第36条第4号・特別教育規程第6条（学科7h以上、活線実技は別途7h）

  # =========================================================
  # Slide 6 — フロー（停電作業 4STEP）
  # =========================================================
  - layout: flow
    title: 停電作業 4STEP
    title_en: SHUTDOWN WORK FLOW
    intro: 安衛則第339条に基づく停電作業の鉄則。順序を守ることで二重三重の安全を確保
    steps:
      - num: "STEP 1"
        head: 検電
        body: 作業前に検電器で無電圧であることを必ず確認、検電器自体も事前点検
      - num: "STEP 2"
        head: 開放・施錠表示
        body: 開閉器を開放し施錠、通電禁止札を掲示し、誤投入を物理的に防止
      - num: "STEP 3"
        head: 短絡接地
        body: 残留電荷の放電と誘導電圧防止のため、作業箇所の電源側に短絡接地
      - num: "STEP 4"
        head: 作業・復旧
        body: 区画明示のうえ作業、復旧時は逆順で接地外し→施錠解除→送電確認

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 感電のメカニズムと保護具
    title_en: SHOCK & PROTECTION
    left_head: 感電のメカニズム 4ポイント
    left_subhead: SHOCK MECHANISM
    left_items:
      - head: 通電経路は手→足が致命的
        body: 心臓を横切る経路（左手→右足等）は心室細動を起こしやすい
      - head: 50mAで生命危険レベル
        body: 通電電流の大きさと時間（IEC 60479）が人体影響を決定
      - head: 濡れ手・発汗で抵抗激減
        body: 皮膚抵抗が乾燥時の数十分の一に低下し感電リスク急増
      - head: 二次災害（墜落）に注意
        body: 高所での感電は反射的反応で墜落・打撲につながる
    right_head: 保護具と絶縁工具 4ポイント
    right_subhead: PROTECTIVE EQUIPMENT
    right_items:
      - head: 絶縁用保護具の着用
        body: 電気用ゴム手袋・絶縁衣・絶縁長靴を活線・活線近接で必ず着用
      - head: 絶縁用防具の取付け
        body: 絶縁シート・絶縁管・絶縁カバーで充電部を物理的に防護
      - head: 検電器・絶縁工具の点検
        body: 使用前に動作確認・外観点検、絶縁性能の定期試験を実施
      - head: 適正な使用電圧の確認
        body: 保護具・工具には使用可能電圧表示。低圧用は7000V以下まで

  # =========================================================
  # Slide 8 — 5ステップ（ヒューマンエラー防止）
  # =========================================================
  - layout: five_steps
    title: ヒューマンエラー防止 5ステップ
    title_en: ERROR PREVENTION
    intro: 「思い込み」「省略」「誤認」を排除する現場運用のステップ
    steps:
      - num: "01"
        head: 指差し呼称
        body: 検電・開放・施錠の各動作で対象を指差し、声に出して確認
      - num: "02"
        head: ダブルチェック
        body: 単独作業を避け、開閉器操作と検電は2人体制で相互確認
      - num: "03"
        head: 施錠管理（LOTO）
        body: ロックアウト・タグアウトで物理的に通電禁止、鍵は作業者が保持
      - num: "04"
        head: 作業区画の明示
        body: 標識・カラーコーン・絶縁シートで作業範囲と立入禁止を視覚化
      - num: "05"
        head: 復旧時の最終確認
        body: 工具・人員撤収を完了確認のうえ送電。逆順手順を必ず遵守

  # =========================================================
  # Slide 9 — 4項目（管理者の責務）
  # =========================================================
  - layout: duties
    title: 管理者の責務
    title_en: MANAGER'S DUTIES
    intro: 安衛法第59条第3項（特別教育）および安衛則第339条・第341条〜第354条に基づく使用者の取組み
    items:
      - num: "01"
        head: 特別教育の確実な実施
        body: 学科7時間以上、活線作業を行う場合は実技7時間追加。受講記録を整備
      - num: "02"
        head: 教育記録の3年保存
        body: 受講者氏名・科目・時間・講師名を記録し、3年以上保存（安衛則第38条）
      - num: "03"
        head: 作業計画と指揮者の選任
        body: 停電作業・活線近接作業ごとに計画を策定し、作業指揮者を選任
      - num: "04"
        head: 保護具・工具の管理
        body: 絶縁用保護具は6か月以内ごとに定期自主検査、記録を3年保存

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 低圧でも死亡災害は起こる
        body: 感電死亡の多くが750V以下で発生、油断は禁物
      - num: "02"
        head: 停電作業は4STEPの鉄則
        body: 検電→開放・施錠→接地→作業の順を絶対に省略しない
      - num: "03"
        head: 保護具と絶縁工具の習熟
        body: 使用前点検と適正電圧の確認を毎回徹底する
      - num: "04"
        head: 教育・点検記録は3年保存
        body: 特別教育記録と保護具の自主検査記録を年1回見直す
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
