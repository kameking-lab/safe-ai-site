meta:
  id: ashiba
  title: 足場の組立て等 特別教育
  subtitle: 組立・解体・変更 対応コース
  english_title: SCAFFOLDING ERECTION SPECIAL EDUCATION
  english_subtitle: Special Education for Scaffolding Erection, Dismantling and Alteration
  legal_basis: 安衛則第36条第39号 ／ 6時間以上（学科のみ。地上または堅固な床上で行う補助作業を除く）
  duration: 約6時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: https://safe-ai-site.vercel.app/contact
  output: ashiba.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 特別教育
    english_title: SCAFFOLDING ERECTION SPECIAL EDUCATION
    title: 足場の組立て等 特別教育
    subtitle: 組立・解体・変更 対応コース
    legal: 安衛則第36条第39号準拠 ／ 6時間以上
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ足場特別教育か
        body: 建設業墜落・転落死亡災害における足場の比重
      - num: "02"
        head: 学科カリキュラムの4要素
        body: 足場の方法・工事用設備・災害防止・関係法令の法定区分
      - num: "03"
        head: 6時間以上の時間割
        body: 法定科目と各時間配分の確認
      - num: "04"
        head: 組立から解体まで4STEP
        body: 計画→組立→使用前点検→解体の流れ
      - num: "05"
        head: 墜落防止と組立解体時のポイント
        body: 手すり先行・親綱・幅木・先行手すり工法
      - num: "06"
        head: 点検5ステップと管理者責務
        body: 安衛則564条に基づく点検と元方の責任
  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ足場特別教育か
    title_en: WHY NOW
    big_value: "30"
    big_unit: "%"
    big_caption: 建設業の墜落・転落死亡災害のうち足場関連が占める比率
    source: 厚生労働省「死亡災害報告」建設業 起因物別分析
    chart_title: 起因物別 建設業 墜落死亡災害の傾向（相対値）
    chart_data:
      - label: 足場
        value: 1.00
      - label: 屋根・はり・もや
        value: 0.85
      - label: 開口部
        value: 0.62
      - label: 階段・桟橋
        value: 0.41
      - label: その他
        value: 0.28
    chart_note: ※足場を1.00として正規化した起因物別の概算傾向。

  # =========================================================
  # Slide 4 — 4象限カード（学科4要素）
  # =========================================================
  - layout: four_quadrant
    title: 学科カリキュラムの4要素
    title_en: FOUR PILLARS
    intro: 安衛則第36条第39号・特別教育規程が定める足場特別教育 学科科目
    quadrants:
      - num: "01"
        head: 足場・作業の方法に関する知識
        body: 足場の種類・構造、組立・解体・変更の方法、墜落・崩壊防止の作業手順
      - num: "02"
        head: 工事用設備・機械・器具・作業環境に関する知識
        body: 鋼管・くさび緊結式・枠組足場の部材、移動式足場、作業床・手すり・幅木
      - num: "03"
        head: 労働災害の防止に関する知識
        body: 墜落・転落、飛来落下、はさまれ、感電の防止、要求性能墜落制止用器具の使用
      - num: "04"
        head: 関係法令
        body: 安衛法・安衛則 第三編第十章（足場）、第518条〜第575条の主要条文の要点

  # =========================================================
  # Slide 5 — 表（カリキュラム時間割）
  # =========================================================
  - layout: table
    title: 6時間以上 カリキュラム時間割
    title_en: CURRICULUM HOURS
    headers: ["科目", "時間", "主な内容", "備考"]
    rows:
      - ["足場・作業の方法に関する知識", "3.0h", "種類・構造・組立解体手順", "学科"]
      - ["工事用設備・機械・器具に関する知識", "0.5h", "部材・作業床・手すり等", "学科"]
      - ["労働災害の防止に関する知識", "1.5h", "墜落・崩壊・飛来落下防止", "学科"]
      - ["関係法令", "1.0h", "安衛則第518条〜第575条等", "学科"]
      - ["合計", "6.0h以上", "学科のみ（実技なし）", "省令最低時間"]
    footnote: 出典：労働安全衛生規則第36条第39号・特別教育規程（学科6時間以上）

  # =========================================================
  # Slide 6 — フロー（点検・使用 4STEP）
  # =========================================================
  - layout: flow
    title: 足場点検・使用 4STEP
    title_en: SCAFFOLD LIFECYCLE
    intro: 安衛則第564条・第567条に基づき、計画から解体までの定型手順を確立する
    steps:
      - num: "STEP 1"
        head: 組立計画
        body: 設置場所・荷重・気象条件を踏まえ、組立図と作業手順書を作成
      - num: "STEP 2"
        head: 組立て
        body: 作業主任者の指揮、先行手すり工法、幅木・メッシュシートの設置
      - num: "STEP 3"
        head: 使用前・始業前点検
        body: 強風・大雨・地震後および毎日の作業開始前に異常の有無を確認
      - num: "STEP 4"
        head: 解体
        body: 上部から順次、足場材の落下防止、立入禁止区画と監視員配置

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 墜落防止と組立解体時のポイント
    title_en: FALL PREVENTION
    left_head: 墜落防止 4ポイント
    left_subhead: FALL PREVENTION
    left_items:
      - head: 手すり先行工法
        body: 上部床に上がる前に手すりを設置、二段手すりと中桟を確保
      - head: 親綱の張設
        body: 移動範囲全体に水平親綱を張り、要求性能墜落制止用器具を常時掛け替え
      - head: 幅木・メッシュシート
        body: 高さ10cm以上の幅木と落下防止シートで飛来落下を防止
      - head: 開口部・隙間の養生
        body: 作業床と建地の隙間は12cm未満、開口部は確実に塞ぐか手すり設置
    right_head: 組立解体時 4ポイント
    right_subhead: ERECTION & DISMANTLING
    right_items:
      - head: 先行手すり工法の徹底
        body: 上層に上がる前に手すりが先行する工法・部材を必ず採用
      - head: 段違い・ずらしの禁止
        body: 作業床の段違い、踏抜きやすい配置を避け、確実な緊結を確認
      - head: 架材・部材の事前点検
        body: 鋼管の曲がり・腐食、緊結金具の損傷、ピン・くさびの摩耗を確認
      - head: 強風・大雨時の作業中止
        body: 10分間平均風速10m/s以上、降雨1mm/h以上、降雪1cm/h以上で中止

  # =========================================================
  # Slide 8 — 5ステップ（点検）
  # =========================================================
  - layout: five_steps
    title: 足場点検の5ステップ
    title_en: INSPECTION 5 STEPS
    intro: 安衛則第567条に基づく点検は、悪天候後・組立変更解体後・始業前に必ず実施
    steps:
      - num: "01"
        head: 床材・幅木の点検
        body: 損傷・腐食・隙間（建地と床の間12cm未満）、固定状況を目視で確認
      - num: "02"
        head: 手すり・中桟の点検
        body: 高さ85cm以上の手すり、35〜50cmの中桟または幅木の有無を確認
      - num: "03"
        head: 緊結部・接続部の点検
        body: 緊結金具・ピン・くさびの緩み、変形、摩耗を点検し、不良は即交換
      - num: "04"
        head: 壁つなぎ・控えの点検
        body: 規定間隔（垂直9m以下・水平8m以下等）の壁つなぎが機能しているか確認
      - num: "05"
        head: 記録・是正
        body: 点検者・点検日・結果と補修内容を記録し、是正完了まで使用禁止表示

  # =========================================================
  # Slide 9 — 4項目（管理者の責務）
  # =========================================================
  - layout: duties
    title: 管理者・元方の責務
    title_en: MANAGER'S DUTIES
    intro: 安衛法第59条第3項（特別教育）・第29条（元方事業者）および安衛則第564条〜第575条に基づく取組み
    items:
      - num: "01"
        head: 特別教育の確実な実施
        body: 学科6時間以上を雇入れ時・配置替え時に実施し、受講記録を整備
      - num: "02"
        head: 教育記録の3年保存
        body: 受講者氏名・科目・時間・講師名を記録し、3年以上保存（安衛則第38条）
      - num: "03"
        head: 作業主任者の選任と職務
        body: つり足場・張出し足場・高さ5m以上の足場では作業主任者を選任し職務遂行
      - num: "04"
        head: 元方事業者としての統括
        body: 関係請負人への指導・連絡調整、合同点検・是正の仕組みを整備

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 足場は墜落死亡の最大起因物
        body: 建設業の墜落災害で足場関連は最大の比重を占める
      - num: "02"
        head: 先行手すり工法を徹底
        body: 組立・解体時こそ墜落リスクが高く、先行設置が原則
      - num: "03"
        head: 点検は安衛則564・567条
        body: 悪天候後・変更解体後・始業前の3局面で必ず実施
      - num: "04"
        head: 記録3年保存と元方統括
        body: 特別教育・点検記録を3年保存し、元方は合同点検で統括
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
