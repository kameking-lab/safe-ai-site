meta:
  id: youtsu-yobou
  title: 腰痛予防 労働衛生教育
  subtitle: 実務対応コース
  english_title: LOW BACK PAIN PREVENTION
  english_subtitle: Workplace Occupational Health Education
  legal_basis: 基発0618第1号（職場における腰痛予防対策指針）準拠
  duration: 約2時間
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: https://safe-ai-site.vercel.app/contact
  output: youtsu-yobou.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 労働衛生教育
    english_title: LOW BACK PAIN PREVENTION
    title: 腰痛予防 労働衛生教育
    subtitle: 実務対応コース
    legal: 基発0618第1号準拠 ／ 約2時間
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: なぜ今、腰痛予防か
        body: 業務上疾病の中で腰痛が占める比率と社会的影響
      - num: "02"
        head: 腰痛予防対策指針の4要素
        body: 作業管理・作業環境管理・健康管理・労働衛生教育
      - num: "03"
        head: 作業別リスクプロファイル
        body: 建設・製造・福祉医療・運輸・事務VDTの傾向
      - num: "04"
        head: リスクアセスメント 4STEP
        body: 危険源特定→見積り→対策→実施・記録
      - num: "05"
        head: 作業姿勢・動作の原則
        body: 重量物取扱いとVDT作業の具体ポイント
      - num: "06"
        head: 体操と管理者の責務
        body: 5分ルーチンと法定責任の整理

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ今、腰痛予防か
    title_en: WHY NOW
    big_value: "60"
    big_unit: "%"
    big_caption: 業務上疾病に占める腰痛の比率
    source: 厚生労働省「業務上疾病発生状況等調査」
    chart_title: 業種別 腰痛発生率の傾向（相対値）
    chart_data:
      - label: 陸上貨物運送
        value: 1.00
      - label: 保健衛生
        value: 0.78
      - label: 社会福祉施設
        value: 0.61
      - label: 建設業
        value: 0.44
      - label: 製造業
        value: 0.29
    chart_note: ※陸上貨物運送業の発生率を1.00として正規化した業種別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（指針の4要素）
  # =========================================================
  - layout: four_quadrant
    title: 腰痛予防対策指針の4要素
    title_en: FOUR PILLARS
    intro: 平成25年改訂「職場における腰痛予防対策指針」が定める使用者の取組み
    quadrants:
      - num: "01"
        head: 作業管理
        body: 自動化・省力化、作業姿勢・動作、作業の実施体制、作業標準、休憩・作業量・作業時間、靴・服装・手袋、補助器具
      - num: "02"
        head: 作業環境管理
        body: 温度（寒冷を避ける）、照明（不適切な姿勢を防ぐ）、作業床面（凹凸・段差・滑り防止）、作業空間・設備の配置
      - num: "03"
        head: 健康管理
        body: 作業者の健康診断、腰痛予防体操の実施、職場における対応（早期受診の勧奨）、心理・社会的要因への配慮
      - num: "04"
        head: 労働衛生教育
        body: 雇入れ時・配置替え時の教育、作業従事者への定期的な教育、管理監督者への教育、補助具の正しい使い方

  # =========================================================
  # Slide 5 — 表（業種別リスクプロファイル）
  # =========================================================
  - layout: table
    title: 作業別リスクプロファイル
    title_en: RISK PROFILE BY INDUSTRY
    headers: ["業種", "主な負荷", "代表動作", "重点対策"]
    rows:
      - ["建設業", "重量物・不整地", "持上げ・運搬・中腰", "補助具・分解搬送・休憩設計"]
      - ["製造業", "反復・立位・ひねり", "組立・搬送・台上作業", "作業台高さ・自動化・配置"]
      - ["福祉・医療", "対人介助・移乗", "抱上げ・前傾・ひねり", "リフト・スライディング・2人介助"]
      - ["陸上運輸", "長時間座位・荷扱い", "運転・積込・荷降し", "シート姿勢・パレット化・分割"]
      - ["事務VDT", "静的姿勢・前傾", "PC作業・電話・書類", "椅子・モニター高・小休止"]
    footnote: 出典：基発0618第1号 別紙 各業種別ガイドラインより要約

  # =========================================================
  # Slide 6 — フロー（RA 4STEP）
  # =========================================================
  - layout: flow
    title: 腰痛のリスクアセスメント 4STEP
    title_en: RISK ASSESSMENT FLOW
    intro: 安衛則第577条の2の趣旨に沿い、現場で実行可能な手順に落とし込む
    steps:
      - num: "STEP 1"
        head: 危険源の特定
        body: 重量・姿勢・反復・環境を作業ごとに洗い出し
      - num: "STEP 2"
        head: リスクの見積り
        body: 重篤度×頻度×可能性で優先度を点数化
      - num: "STEP 3"
        head: 対策の検討・選定
        body: 排除→代替→工学→管理→保護で選定
      - num: "STEP 4"
        head: 実施・記録・見直し
        body: 記録3年保存、定期見直しと再評価

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 作業姿勢・動作の原則
    title_en: POSTURE & MOTION
    left_head: 重量物取扱い 4ポイント
    left_subhead: HEAVY LIFTING
    left_items:
      - head: 持上げ前に足幅を肩幅
        body: 体に荷を密着させて重心を近づける
      - head: 膝を曲げて腰を落とす
        body: 背中はまっすぐ。腰だけで持ち上げない
      - head: ひねり動作を避ける
        body: 体の正面で扱い、向きは足から変える
      - head: 単独取扱い重量の上限
        body: 男性は体重の約40％以下、女性は約24％以下を目安（指針）
    right_head: VDT作業 4ポイント
    right_subhead: VDT WORK
    right_items:
      - head: 椅子は深く腰掛け背を支持
        body: 骨盤を立てて腰部の前弯を保つ
      - head: モニター上端を視線水平に
        body: 距離は概ね40cm以上を確保
      - head: 連続作業は1時間以内
        body: 10〜15分の小休止で姿勢をリセット
      - head: 肘・手首は概ね水平
        body: キーボード位置で肩の緊張を抑制

  # =========================================================
  # Slide 8 — 5ステップ（体操ルーチン）
  # =========================================================
  - layout: five_steps
    title: 腰痛予防体操 5分ルーチン
    title_en: 5-MINUTE ROUTINE
    intro: 始業前または小休止に。痛みのある場合は中止し医師に相談
    steps:
      - num: "01"
        head: 骨盤前後傾
        body: 仰向けまたは座位で骨盤をゆっくり前後に動かす（30秒）
      - num: "02"
        head: 体側ストレッチ
        body: 立位で片手を頭上に伸ばし反対側へ側屈（左右各30秒）
      - num: "03"
        head: ハムストリング
        body: 椅子座位で片脚を伸ばし、ももの裏を伸ばす（左右各30秒）
      - num: "04"
        head: キャット&カウ
        body: 四つ這いで背中を丸める・反らすを繰り返す（60秒）
      - num: "05"
        head: 体幹ひねり
        body: 椅子座位で上体をゆっくり左右にひねる（左右各30秒）

  # =========================================================
  # Slide 9 — 4項目（管理者の責務）
  # =========================================================
  - layout: duties
    title: 管理者の責務
    title_en: MANAGER'S DUTIES
    intro: 安衛法第59条（雇入時等）・第60条の2（従事者への安全衛生教育の努力義務）および関係指針に基づく使用者の取組み
    items:
      - num: "01"
        head: 健康診断の実施
        body: 配置前および定期。腰部の自覚症状・既往歴を含めた問診を組み込む
      - num: "02"
        head: 職場巡視・現場確認
        body: 補助具の使用状況、姿勢、休憩取得を定期的に確認し改善指示
      - num: "03"
        head: 教育の計画的実施
        body: 雇入れ時・配置替え時、年1回以上の再教育を年間計画に明記
      - num: "04"
        head: 記録の保存
        body: 教育記録・健診記録・RA記録を3年以上保存し、是正履歴を残す

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 腰痛は「作業×環境×個人」の重層リスク
        body: 単一対策ではなく4要素を組み合わせる
      - num: "02"
        head: リスクアセスメントを定常運用に
        body: 4STEPを年1回以上、変更時にも再実施
      - num: "03"
        head: 補助具と教育で属人化を断つ
        body: リフト・スライディング等の活用が前提
      - num: "04"
        head: 記録と再評価が継続改善の核
        body: 教育・健診・RAは3年保存、毎年見直し
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
