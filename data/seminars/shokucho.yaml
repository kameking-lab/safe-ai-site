meta:
  id: shokucho
  title: 職長等教育
  subtitle: 安全衛生責任者対応コース
  english_title: FOREMAN SAFETY EDUCATION
  english_subtitle: Supervisor Training for Designated Industries
  legal_basis: "安衛法第60条 ／ 安衛則第40条 ／ 12時間以上 ／ 製造業・建設業等の指定業種が対象"
  duration: "12時間以上（2日間想定）"
  supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
  contact: "https://safe-ai-site.vercel.app/contact"
  output: shokucho.pptx

slides:
  # =========================================================
  # Slide 1 — 表紙
  # =========================================================
  - layout: cover
    badge: 安全衛生教育
    english_title: FOREMAN SAFETY EDUCATION
    title: 職長等教育
    subtitle: 安全衛生責任者対応コース
    legal: "安衛法第60条準拠 ／ 12時間以上（2日間想定）"
    supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修

  # =========================================================
  # Slide 2 — 目次
  # =========================================================
  - layout: agenda
    title: 本日のアジェンダ
    title_en: AGENDA
    items:
      - num: "01"
        head: 職長教育の意義と背景
        body: 指定業種における職長配置の法的位置づけと社会的役割
      - num: "02"
        head: 法定5区分の全体像
        body: 安衛則第40条が定めるカリキュラム構成と時間配分
      - num: "03"
        head: 12時間カリキュラム
        body: 科目ごとの時間割と現場で押さえるポイント
      - num: "04"
        head: リスクアセスメント実務
        body: 安衛則第24条の11準拠 4STEPの運用
      - num: "05"
        head: 指導・監督と異常時措置
        body: 4原則と4ポイントで現場をマネジメントする
      - num: "06"
        head: 配置・指導の5ステップと法的責務
        body: 統括安全衛生責任者との連携と記録の整備

  # =========================================================
  # Slide 3 — 大数字 + 業種別棒グラフ
  # =========================================================
  - layout: big_number
    title: なぜ職長教育が必要か
    title_en: WHY FOREMAN TRAINING
    big_value: "12"
    big_unit: h
    big_caption: 安衛則第40条が定める職長等教育の最低時間
    source: 厚生労働省「労働安全衛生規則 第40条」
    chart_title: 業種別 職長教育受講者数の傾向（相対値）
    chart_data:
      - label: 建設業
        value: 1.00
      - label: 製造業
        value: 0.86
      - label: 機械修理業
        value: 0.34
      - label: 自動車整備業
        value: 0.27
      - label: 電気・ガス業
        value: 0.18
    chart_note: ※建設業の受講者数を1.00として正規化した業種別傾向の概算。

  # =========================================================
  # Slide 4 — 4象限カード（法定5区分のうち主要4つ）
  # =========================================================
  - layout: four_quadrant
    title: 法定カリキュラムの主要4区分
    title_en: FOUR CORE TOPICS
    intro: 安衛則第40条が定める5区分のうち、現場運用上の比重が大きい4区分を整理
    quadrants:
      - num: "01"
        head: 作業方法の決定及び労働者の配置
        body: 作業手順書の作成、適性配置、未経験者へのOJT、機械・工具の選定（2時間）
      - num: "02"
        head: 労働者に対する指導又は監督の方法
        body: 教育訓練、指示の具体化、確認、フィードバック、コミュニケーション（2.5時間）
      - num: "03"
        head: 危険性又は有害性等の調査及びその結果に基づき講ずる措置
        body: リスクアセスメントの実施、見積り、低減措置の選定（4時間）
      - num: "04"
        head: 異常時等における措置
        body: 異常発見時の停止・退避・報告、災害発生時の応急措置、再発防止（1.5時間）

  # =========================================================
  # Slide 5 — 表（12時間カリキュラム時間割）
  # =========================================================
  - layout: table
    title: 12時間カリキュラム時間割
    title_en: 12-HOUR CURRICULUM
    headers: ["科目", "時間", "主な内容", "形式"]
    rows:
      - ["作業方法の決定・労働者の配置", "2.0h", "作業手順書、適性配置、機械工具選定", "講義+演習"]
      - ["指導又は監督の方法", "2.5h", "指示の具体化・確認・FB・記録", "講義+ロールプレイ"]
      - ["危険性・有害性の調査と措置", "4.0h", "RA 4STEP、見積り、低減措置の選定", "講義+グループ演習"]
      - ["異常時等における措置", "1.5h", "停止・退避・報告・応急措置・原因調査", "講義+ケース"]
      - ["その他労働災害防止活動", "2.0h", "KY活動、4S、ヒヤリハット、健康管理", "講義+討議"]
    footnote: 出典：安衛法第60条／安衛則第40条 別表 第三 を整理。合計12時間以上。

  # =========================================================
  # Slide 6 — フロー（RA 4STEP）
  # =========================================================
  - layout: flow
    title: リスクアセスメント 4STEP
    title_en: RISK ASSESSMENT FLOW
    intro: 安衛則第24条の11が定めるリスクアセスメントの基本手順を職長業務に落とし込む
    steps:
      - num: "STEP 1"
        head: 危険性・有害性の特定
        body: 作業ごとに機械・物質・環境・人の要因を洗い出し
      - num: "STEP 2"
        head: リスクの見積り
        body: 重篤度×頻度×可能性で優先度を点数化
      - num: "STEP 3"
        head: 低減措置の検討・決定
        body: 排除→代替→工学→管理→保護具の順で選定
      - num: "STEP 4"
        head: 実施・記録・見直し
        body: 記録3年以上保存、定期見直しと再評価を年間計画化

  # =========================================================
  # Slide 7 — 2カラム × 4ポイント
  # =========================================================
  - layout: cards_2col
    title: 指導・監督と異常時措置
    title_en: SUPERVISION & EMERGENCY
    left_head: 指導・監督の4原則
    left_subhead: SUPERVISION
    left_items:
      - head: 指示の具体化
        body: 5W1Hで作業内容・範囲・期限・方法を明確に伝達
      - head: 確認
        body: 作業前・作業中・作業後に手順遵守と安全状態を確認
      - head: フィードバック
        body: 良い点と改善点を即時に共有し、次の作業へ反映
      - head: 記録
        body: 指示・確認・指導の事実を作業日報や教育記録に残す
    right_head: 異常時措置の4ポイント
    right_subhead: EMERGENCY ACTION
    right_items:
      - head: 停止
        body: 異常を認めたら直ちに作業を停止し、二次災害を防止
      - head: 退避
        body: 危険区域からの退避経路を確保し、人員を安全な位置へ誘導
      - head: 報告
        body: 元方・統括安全衛生責任者・管理者へ速やかに報告
      - head: 原因調査
        body: 事実関係を記録し、再発防止策を作業手順に反映

  # =========================================================
  # Slide 8 — 5ステップ（配置と指導の5ステップ）
  # =========================================================
  - layout: five_steps
    title: 配置と指導の5ステップ
    title_en: 5-STEP DEPLOYMENT
    intro: 作業前の段取りから作業後の振り返りまでを職長の標準動作として整理
    steps:
      - num: "01"
        head: 作業計画の確認
        body: 作業手順書・KY実施記録・必要工具と保護具を事前に確認
      - num: "02"
        head: 適性配置
        body: 経験・資格・健康状態を踏まえて作業者を割り当て
      - num: "03"
        head: 作業指示と教育
        body: 5W1Hの具体指示と新規入場者への必要な教育を実施
      - num: "04"
        head: 巡視・監督
        body: 危険要因と作業姿勢を巡視し、必要に応じて即時是正
      - num: "05"
        head: 振り返り・記録
        body: 終業時にヒヤリハットを共有し、教育・指示記録を残す

  # =========================================================
  # Slide 9 — 4項目（職長の法的責務）
  # =========================================================
  - layout: duties
    title: 職長の法的責務
    title_en: FOREMAN'S LEGAL DUTIES
    intro: 安衛則第133条等および統括安全衛生責任者制度（安衛法第15条・第16条）に基づく職長の責任範囲
    items:
      - num: "01"
        head: 作業の直接指揮
        body: 安衛則第133条に基づき、特定機械等の作業を直接指揮し安全確保
      - num: "02"
        head: 統括安全衛生責任者との連携
        body: 元方事業者の統括下で安全衛生責任者として情報共有・調整
      - num: "03"
        head: 作業者の教育・訓練
        body: 雇入れ時・配置替え時の教育、新規入場者教育、KY活動の実施
      - num: "04"
        head: 記録の保存
        body: 教育記録・RA記録・指示記録を3年以上保存し、是正履歴を残す

  # =========================================================
  # Slide 10 — まとめ（ネイビー背景）
  # =========================================================
  - layout: takeaways
    title: 本日のまとめ
    title_en: KEY TAKEAWAYS
    items:
      - num: "01"
        head: 職長は現場安全の要
        body: 法定5区分12時間以上で安衛法第60条の責任を果たす
      - num: "02"
        head: RAは職長業務の中核
        body: 4STEPを年1回以上、変更時にも再実施し記録を残す
      - num: "03"
        head: 指導と異常時措置を型に
        body: 4原則と4ポイントで属人化を断ち、即応力を高める
      - num: "04"
        head: 統括との連携と記録
        body: 統括安全衛生責任者と連携し、記録3年以上保存で改善を継続
    footer_label: お問い合わせ
    footer_value: safe-ai-site.vercel.app/contact
    footer_supervisor: ANZEN AI ／ 労働安全コンサルタント（登録番号260022・土木）監修
