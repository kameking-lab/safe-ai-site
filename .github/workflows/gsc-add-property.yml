name: GSC Add Property Ownership

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "GSC property identifier (sc-domain:<domain> or https://www.<domain>/)"
        required: false
        default: "sc-domain:anzen-ai-portal.jp"

permissions:
  contents: read

jobs:
  add-property:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add GSC property via sites.add API
        run: node scripts/etl/gsc-add-property.mjs
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GSC_TARGET_SITE: ${{ github.event.inputs.site_url || 'sc-domain:anzen-ai-portal.jp' }}
