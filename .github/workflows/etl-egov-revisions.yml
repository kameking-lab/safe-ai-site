name: e-Gov law revisions ETL

on:
  schedule:
    # 毎週月曜 09:00 JST = 00:00 UTC（週次。反映ラグ短縮 P2-3。diff-onlyのため無料枠内）
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (tsx)
        run: npm ci

      - name: Fetch e-Gov law revisions (structural data only)
        run: npx tsx scripts/etl/egov-revisions-fetch.ts
        env:
          NODE_OPTIONS: "--no-warnings"

      - name: Commit if changed
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- web/src/data/law-revisions/egov-revisions.json; then
            echo "No e-Gov revision changes"
            exit 0
          fi
          git add web/src/data/law-revisions/egov-revisions.json
          git commit -m "chore(news): e-Gov law revisions update [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" || true
            if git push origin HEAD:"${{ github.ref_name }}"; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "Failed to push after retries"
          exit 1
