name: News feed (autonomous RSS + AI judge)

on:
  schedule:
    # Daily 06:00 JST  =  21:00 UTC (previous day)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-feed-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stage 1 — fetch RSS feeds (keyword filter + dedupe)
        run: node scripts/etl/fetch-news-feed.mjs
        env:
          NODE_OPTIONS: "--no-warnings"

      - name: Stage 2 — AI judge gate (Gemini 2.5 Flash, 4 scores)
        run: node scripts/etl/news-ai-judge.mjs
        env:
          NODE_OPTIONS: "--no-warnings"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- web/src/data/news-feed; then
            echo "No news-feed changes"
            exit 0
          fi
          git add web/src/data/news-feed
          git commit -m "chore(news-feed): scheduled autonomous refresh [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" || true
            if git push origin HEAD:"${{ github.ref_name }}"; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "Failed to push after retries"
          exit 1
