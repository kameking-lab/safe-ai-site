name: web-ci

on:
  workflow_dispatch:
    inputs:
      run_full:
        description: "fullジョブを実行する"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 18 * * *"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (live mode)
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts (smoke)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            web/playwright-report
            web/test-results

  full:
    if: github.event_name == 'push' || github.event.inputs.run_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E full tests (live mode)
        run: npm run test:e2e:ci

      - name: Upload Playwright artifacts (full)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            web/playwright-report
            web/test-results
