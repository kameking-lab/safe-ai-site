name: newsletter-weekly

on:
  # 毎週月曜日 9:00 JST (= UTC 00:00)
  schedule:
    - cron: "0 0 * * 1"
  # 手動実行（dry-run オプション付き）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン（実際には送信しない）"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_AUDIENCE_ID: ${{ secrets.NEWSLETTER_AUDIENCE_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/send-newsletter.mjs $DRY_FLAG
