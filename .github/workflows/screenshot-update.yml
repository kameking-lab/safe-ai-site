name: screenshot-update

# 機能紹介ページ用のスクリーンショットを毎週月曜0時(UTC)に更新する
# - 本番URLをPlaywrightで巡回
# - 差分があればPRを自動作成

on:
  schedule:
    # 毎週月曜 00:00 UTC（JST 9:00）に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      base_url:
        description: "撮影対象のベースURL"
        required: false
        default: "https://safe-ai-site.vercel.app"

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright (root scripts)
        run: |
          npm init -y
          npm install --no-save playwright@^1.58.2
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        env:
          SCREENSHOT_BASE_URL: ${{ inputs.base_url || 'https://safe-ai-site.vercel.app' }}
        run: node scripts/capture-screenshots.mjs

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet web/public/screenshots; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/screenshot-update
          delete-branch: true
          commit-message: "chore(screenshots): 自動更新"
          title: "chore(screenshots): 機能紹介ページのスクリーンショット自動更新"
          body: |
            ## 自動スクリーンショット更新

            毎週月曜の自動実行により、`web/public/screenshots/` を本番サイトの最新表示で更新しました。

            - ベースURL: `${{ inputs.base_url || 'https://safe-ai-site.vercel.app' }}`
            - 実行: `node scripts/capture-screenshots.mjs`
            - デスクトップ (1280x800) + モバイル (375x667)

            ### マージ前チェック
            - [ ] 差分が意図した範囲か（破壊的なUI変更がないか）
            - [ ] 機能紹介ページの表示で問題ないか

            ---
            🤖 Generated by `.github/workflows/screenshot-update.yml`
          labels: |
            automated
            screenshots

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "✓ スクリーンショットに差分なし"
