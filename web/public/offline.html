<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン｜ANZEN AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #1a7a4c; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 0.95rem; line-height: 1.6; max-width: 360px; }
    .badge {
      margin-top: 1.5rem;
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 9999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: #475569;
    }
    .actions { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
    button {
      background: #1a7a4c;
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #166040; }
    .note { margin-top: 2rem; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>オフラインです</h1>
  <p>現在インターネットに接続されていません。<br>一度アクセスしたページはキャッシュから閲覧できます。</p>
  <div class="badge">ANZEN AI — オフラインモード</div>
  <div class="actions">
    <button onclick="window.location.reload()">再読み込み</button>
    <button onclick="history.back()">前のページに戻る</button>
  </div>
  <p class="note">KY用紙のデータはローカルストレージに保存されているため、<br>オフラインでも参照できます。</p>
</body>
</html>
